<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); }
  </style>
</head>
<body class="bg-gradient-to-br from-emerald-50 to-teal-50 min-h-screen">

  <div class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-2xl w-full">
      
      <!-- Header -->
      <div class="text-center mb-10">
        <div class="w-20 h-20 bg-emerald-600 text-white rounded-3xl flex items-center justify-center text-5xl mx-auto shadow-xl shadow-emerald-200">
          ✉️
        </div>
        <h1 class="text-4xl font-bold text-emerald-900 mt-6">Get in Touch</h1>
        <p class="text-emerald-600 mt-2 text-lg">Direct message to the owner</p>
      </div>

      <!-- Form Card -->
      <div class="glass rounded-3xl shadow-2xl border border-emerald-100 overflow-hidden">
        <div class="p-10">
          <form id="contactForm" onsubmit="sendEmail(event)">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label class="block text-emerald-700 text-sm font-medium mb-1">Full Name</label>
                <input type="text" id="name" required
                       class="w-full px-5 py-4 bg-white border border-emerald-200 rounded-2xl focus:outline-none focus:border-emerald-500 transition-all"
                       placeholder="John Doe">
              </div>
              <div>
                <label class="block text-emerald-700 text-sm font-medium mb-1">Email Address</label>
                <input type="email" id="email" required
                       class="w-full px-5 py-4 bg-white border border-emerald-200 rounded-2xl focus:outline-none focus:border-emerald-500 transition-all"
                       placeholder="you@example.com">
              </div>
            </div>

            <div class="mt-6">
              <label class="block text-emerald-700 text-sm font-medium mb-1">Subject</label>
              <input type="text" id="subject" required
                     class="w-full px-5 py-4 bg-white border border-emerald-200 rounded-2xl focus:outline-none focus:border-emerald-500 transition-all"
                     placeholder="Website Inquiry">
            </div>

            <div class="mt-6">
              <label class="block text-emerald-700 text-sm font-medium mb-1">Message</label>
              <textarea id="message" rows="6" required
                        class="w-full px-5 py-4 bg-white border border-emerald-200 rounded-3xl focus:outline-none focus:border-emerald-500 transition-all resize-none"
                        placeholder="Write your message here..."></textarea>
            </div>

            <button type="submit" id="submitBtn"
                    class="mt-10 w-full bg-emerald-600 hover:bg-emerald-700 active:scale-95 transition-all text-white font-semibold text-lg py-6 rounded-3xl flex items-center justify-center gap-3 shadow-lg shadow-emerald-300">
              <span id="btnText">Send Message</span>
            </button>
          </form>
        </div>
      </div>

      <p class="text-center text-emerald-600 text-sm mt-8">
        Owner Email: <span class="font-medium">toolmatrix415@gmail.com</span>
      </p>
    </div>
  </div>

  <!-- Success Modal -->
  <div id="successModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl p-10 text-center max-w-sm mx-4">
      <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center text-5xl mx-auto mb-6">
        ✅
      </div>
      <h2 class="text-2xl font-bold text-emerald-900">Message Sent!</h2>
      <p class="text-emerald-600 mt-3">Thank you! Your message has been sent successfully to the owner.</p>
      <button onclick="closeModal()" 
              class="mt-8 bg-emerald-600 text-white px-10 py-3.5 rounded-2xl font-medium">
        Done
      </button>
    </div>
  </div>

  <script>
    // ================== EMAILJS SETUP ==================
    // Yahan apne EmailJS details daalein
    const SERVICE_ID = "YOUR_SERVICE_ID";
    const TEMPLATE_ID = "YOUR_TEMPLATE_ID";
    const PUBLIC_KEY = "YOUR_PUBLIC_KEY";

    function sendEmail(e) {
      e.preventDefault();

      const btn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');

      btn.disabled = true;
      btnText.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Sending...`;

      const templateParams = {
        from_name: document.getElementById('name').value,
        from_email: document.getElementById('email').value,
        subject: document.getElementById('subject').value,
        message: document.getElementById('message').value,
        to_email: "toolmatrix415@gmail.com"
      };

      emailjs.send(SERVICE_ID, TEMPLATE_ID, templateParams, PUBLIC_KEY)
        .then(() => {
          document.getElementById('successModal').classList.remove('hidden');
          document.getElementById('contactForm').reset();
        })
        .catch((err) => {
          alert("Failed to send message. Please try again.");
          console.error(err);
        })
        .finally(() => {
          btn.disabled = false;
          btnText.textContent = "Send Message";
        });
    }

    function closeModal() {
      document.getElementById('successModal').classList.add('hidden');
    }

    // Initialize EmailJS
    window.onload = () => {
      if (PUBLIC_KEY === "YOUR_PUBLIC_KEY") {
        console.warn("Please replace EmailJS credentials in the code.");
      } else {
        emailjs.init(PUBLIC_KEY);
      }
    };
  </script>
</body>
</html>
