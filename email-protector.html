<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Email Owner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .tail-container { max-width: 800px; margin: 0 auto; }
  </style>
</head>
<body class="bg-emerald-50 min-h-screen">

  <div class="min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-emerald-600 text-white py-8 shadow-lg">
      <div class="tail-container px-6 text-center">
        <div class="w-16 h-16 bg-white text-emerald-600 rounded-3xl flex items-center justify-center text-4xl mx-auto mb-4">
          ✉️
        </div>
        <h1 class="text-4xl font-bold">Contact Owner</h1>
        <p class="text-emerald-100 mt-2">Message bhejiye directly owner ko</p>
      </div>
    </header>

    <main class="flex-1 tail-container px-6 py-12">
      <div class="bg-white rounded-3xl shadow-xl p-10">
        <form id="contactForm" onsubmit="sendEmail(event)">
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-emerald-700 font-medium mb-2">Aapka Naam</label>
              <input type="text" id="name" required
                     class="w-full px-5 py-4 border border-emerald-200 rounded-2xl focus:outline-none focus:border-emerald-500"
                     placeholder="Rahul Sharma">
            </div>
            <div>
              <label class="block text-emerald-700 font-medium mb-2">Aapka Email</label>
              <input type="email" id="email" required
                     class="w-full px-5 py-4 border border-emerald-200 rounded-2xl focus:outline-none focus:border-emerald-500"
                     placeholder="your@email.com">
            </div>
          </div>

          <div class="mt-6">
            <label class="block text-emerald-700 font-medium mb-2">Subject</label>
            <input type="text" id="subject" required
                   class="w-full px-5 py-4 border border-emerald-200 rounded-2xl focus:outline-none focus:border-emerald-500"
                   placeholder="Website Enquiry">
          </div>

          <div class="mt-6">
            <label class="block text-emerald-700 font-medium mb-2">Message</label>
            <textarea id="message" rows="7" required
                      class="w-full px-5 py-4 border border-emerald-200 rounded-3xl focus:outline-none focus:border-emerald-500 resize-none"
                      placeholder="Aapka message yahan likhein..."></textarea>
          </div>

          <button type="submit"
                  class="mt-10 w-full bg-emerald-600 hover:bg-emerald-700 transition-all text-white text-xl font-semibold py-6 rounded-3xl flex items-center justify-center gap-3 shadow-lg">
            <i class="fa-solid fa-paper-plane"></i>
            Send Message to Owner
          </button>
        </form>
      </div>

      <div class="text-center mt-8 text-emerald-600 text-sm">
        Owner Email: <strong>toolmatrix415@gmail.com</strong>
      </div>
    </main>

    <footer class="py-8 text-center text-emerald-600 text-sm">
      Contact Form • Direct Email to Owner
    </footer>
  </div>

  <script>
    function sendEmail(e) {
      e.preventDefault();

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const subject = document.getElementById('subject').value;
      const message = document.getElementById('message').value;

      const ownerEmail = "toolmatrix415@gmail.com";

      // Pre-filled email body
      const body = `Name: ${name}%0D%0AEmail: ${email}%0D%0A%0D%0AMessage:%0D%0A${message}`;

      // Create mailto link
      const mailtoLink = `mailto:${ownerEmail}?subject=${encodeURIComponent(subject)}&body=${body}`;

      // Open user's default email client
      window.location.href = mailtoLink;

      // Success message
      setTimeout(() => {
        alert("✅ Thank you! Your email client has been opened.\n\nPlease click Send in your email app.");
      }, 500);
    }
  </script>
</body>
</html>
