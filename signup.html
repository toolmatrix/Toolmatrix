<!DOCTYPE html>
<html>
<head>
<title>Sign Up</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial;
background:#eafaf1;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.box{
background:white;
padding:30px;
width:100%;
max-width:400px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
text-align:center;
}
input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}
.email-btn{background:#2ecc71;color:white;}
.google{background:#db4437;color:white;}
.facebook{background:#1877f2;color:white;}
.github{background:#333;color:white;}
</style>
</head>

<body>

<div class="box">
<h2>Create Account</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button class="email-btn" onclick="signUp()">Sign Up with Email</button>

<hr>

<button class="google" onclick="socialSignup('google')">
🔵 Sign Up with Google
</button>

<button class="facebook" onclick="socialSignup('facebook')">
📘 Sign Up with Facebook
</button>

<button class="github" onclick="socialSignup('github')">
🐱 Sign Up with GitHub
</button>

<p style="margin-top:15px;">
Already have account? <a href="login.html">Login</a>
</p>

</div>

<script>
const { createClient } = supabase;

const supabaseClient = createClient(
"https://zykeocrfxbjicfeahzny.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5a2VvY3JmeGJqaWNmZWFoem55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MTkxMTQsImV4cCI6MjA4Nzk5NTExNH0.S7_Lx03URFuNm1ok-YkTe4u69WOvmczltoEQ_6zrOVw"
);

async function signUp(){
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const { error } = await supabaseClient.auth.signUp({
email,
password
});

if(error){ alert(error.message); }
else{ alert("Check your email for verification"); }
}

async function socialSignup(provider){
await supabaseClient.auth.signInWithOAuth({
provider: provider,
options: {
redirectTo: window.location.origin + "/index.html"
}
});
}
</script>

</body>
</html>
