<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Editor - iLoveIMG Style</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://uicdn.toast.com/tui-image-editor/latest/tui-image-editor.css">
  <style>
    body { background: #0a0a0a; }
    #tui-image-editor { width: 100% !important; height: calc(100vh - 60px) !important; }
  </style>
</head>
<body class="text-white">

  <div class="flex items-center justify-between bg-black px-6 py-4 border-b border-zinc-800">
    <h1 class="text-2xl font-bold flex items-center gap-2">
      📸 <span>Photo Editor</span>
    </h1>
    <p class="text-zinc-400 text-sm">iLoveIMG jaisa powerful tool</p>
  </div>

  <div id="tui-image-editor"></div>

  <script src="https://uicdn.toast.com/tui-code-snippet/v1.5.2/tui-code-snippet.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/1.7.22/fabric.min.js"></script>
  <script src="https://uicdn.toast.com/tui-image-editor/latest/tui-image-editor.min.js"></script>

  <script>
    const imageEditor = new tui.ImageEditor('#tui-image-editor', {
      includeUI: {
        loadImage: {
          path: '',
          name: 'Image'
        },
        initMenu: 'crop',
        menuBarPosition: 'left',
        uiSize: {
          width: '100%',
          height: '100%'
        }
      },
      cssMaxWidth: 1200,
      cssMaxHeight: 800,
      usageStatistics: false
    });

    // Mobile pe better experience ke liye
    window.addEventListener('resize', () => {
      imageEditor.resizeCanvasDimension();
    });
  </script>

</body>
</html>
