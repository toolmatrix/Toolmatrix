<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{
      font-family: Arial;
      background:#f0fff4;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .box{
      background:white;
      padding:30px;
      width:100%;
      max-width:400px;
      border-radius:12px;
      box-shadow:0 0 15px rgba(0,0,0,0.1);
      text-align:center;
    }

    input{
      width:100%;
      padding:12px;
      margin:10px 0;
      border:1px solid #ccc;
      border-radius:6px;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:6px;
      background:#2ecc71;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover{
      background:#27ae60;
    }

    .message{
      margin-top:10px;
      font-size:14px;
    }

    .error{
      color:red;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>User Login</h2>

  <input type="email" id="email" placeholder="Enter Email" required>
  <input type="password" id="password" placeholder="Enter Password" required>

  <button onclick="login()">Login</button>

  <p id="message" class="message"></p>
</div>

<script>
  const { createClient } = supabase;

  const supabaseClient = createClient(
    "https://xopuhztkoxidhwmilmlc.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvcHVoenRrb3hpZGh3bWlsbWxjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0MjM0MjgsImV4cCI6MjA4Njk5OTQyOH0.2Ix2jlleW-f5RYlL2i6d9PiQL9PfgGPfw1RkHYFkHgE"
  );

  async function login(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const message = document.getElementById("message");

    const { data, error } = await supabaseClient.auth.signInWithPassword({
      email: email,
      password: password
    });

    if(error){
      message.innerHTML = error.message;
      message.className = "message error";
    } else{
      message.innerHTML = "Login Successful!";
      message.className = "message";
      
      // Redirect after login
      setTimeout(() => {
        window.location.href = "/index.html";
      }, 1000);
    }
  }
</script>

</body>
</html>
