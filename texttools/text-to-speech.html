<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Text to Speech — Free Online Tool</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{
            --g50:#f1fdf2;--g100:#E8F5E9;--g200:#C8E6C9;--g300:#A5D6A7;--g400:#81C784;
            --g500:#66BB6A;--g600:#4CAF50;--g700:#43A047;--g800:#388E3C;--g900:#2E7D32;--g950:#1B5E20;
            --w:#fff;--txt:#2c3e2c;--txtL:#6b7e6b;--txtM:#94a894;--bdr:#d4ead4;
            --red:#EF5350;--blue:#42A5F5;--purple:#AB47BC;--orange:#FF9800;--teal:#26A69A;--pink:#EC407A;--yellow:#FFCA28;
            --sh:0 8px 30px rgba(46,125,50,.10);--shL:0 20px 60px rgba(46,125,50,.15);
            --r:16px;--rs:10px;--rx:6px;--t:.25s cubic-bezier(.4,0,.2,1)
        }
        html,body{width:100%;height:100%;overflow:hidden;font-family:'Inter',-apple-system,sans-serif;
            background:var(--g100);color:var(--txt);-webkit-font-smoothing:antialiased}
        .app{width:100vw;height:100vh;display:flex;flex-direction:column;overflow:hidden}

        /* ===== NAVBAR ===== */
        .nav{flex-shrink:0;background:linear-gradient(135deg,var(--g800),var(--g950));
            padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;
            box-shadow:0 4px 20px rgba(27,94,32,.3);z-index:200}
        .nav-left{display:flex;align-items:center;gap:12px}
        .logo-ic{width:38px;height:38px;background:var(--w);border-radius:10px;display:flex;
            align-items:center;justify-content:center;font-size:18px;color:var(--g700);
            box-shadow:0 2px 8px rgba(0,0,0,.1)}
        .logo-t{font-size:19px;font-weight:800;color:var(--w)}
        .logo-t span{color:#FFEB3B}
        .nav-right{display:flex;align-items:center;gap:8px}
        .nb{height:36px;padding:0 16px;border-radius:8px;border:1.5px solid rgba(255,255,255,.15);
            background:rgba(255,255,255,.1);color:#fff;font-size:12px;font-weight:600;cursor:pointer;
            transition:var(--t);font-family:inherit;display:flex;align-items:center;gap:6px}
        .nb:hover{background:rgba(255,255,255,.2)}
        .nb.yel{background:linear-gradient(135deg,#FFEB3B,#FFC107);color:var(--g950);
            border-color:transparent;box-shadow:0 3px 12px rgba(255,193,7,.3)}
        .nb.yel:hover{transform:translateY(-1px)}
        .mmenu{display:none;width:36px;height:36px;border-radius:8px;border:1.5px solid rgba(255,255,255,.15);
            background:rgba(255,255,255,.1);color:#fff;font-size:16px;cursor:pointer;
            align-items:center;justify-content:center}

        /* ===== MAIN ===== */
        .main{flex:1;display:flex;overflow:hidden;position:relative}

        /* ===== SIDEBAR ===== */
        .sb{width:310px;flex-shrink:0;background:var(--w);border-right:1px solid var(--bdr);
            display:flex;flex-direction:column;overflow:hidden;z-index:50}
        .sb-hdr{flex-shrink:0;padding:14px 18px;border-bottom:1px solid var(--bdr);background:var(--g50);
            display:flex;align-items:center;justify-content:space-between}
        .sb-title{font-size:13px;font-weight:700;color:var(--g900);display:flex;align-items:center;gap:8px;
            text-transform:uppercase;letter-spacing:.5px}
        .sb-title i{font-size:15px}
        .sb-close{display:none;width:28px;height:28px;border-radius:7px;border:none;background:var(--g200);
            color:var(--g800);font-size:13px;cursor:pointer;align-items:center;justify-content:center;transition:var(--t)}
        .sb-close:hover{background:var(--g600);color:#fff}
        .sb-scroll{flex:1;overflow-y:auto;padding:16px 18px}
        .sb-scroll::-webkit-scrollbar{width:5px}
        .sb-scroll::-webkit-scrollbar-thumb{background:var(--g300);border-radius:10px}

        /* Settings Groups */
        .sg{margin-bottom:22px}
        .sgl{font-size:11px;font-weight:700;color:var(--g800);text-transform:uppercase;letter-spacing:.8px;
            margin-bottom:8px;display:flex;align-items:center;gap:6px}
        .sgl i{color:var(--g600);font-size:13px}
        .sgd{font-size:11px;color:var(--txtM);margin-bottom:10px;line-height:1.5}

        /* Voice Card */
        .voice-card{padding:14px;border:2px solid var(--g200);border-radius:var(--rs);background:var(--g50);
            margin-bottom:12px;cursor:pointer;transition:var(--t);position:relative;overflow:hidden}
        .voice-card:hover{border-color:var(--g400);background:var(--g100)}
        .voice-card.active{border-color:var(--g600);background:linear-gradient(135deg,var(--g100),var(--g50));
            box-shadow:0 2px 12px rgba(76,175,80,.12)}
        .voice-card.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--g600)}
        .vc-top{display:flex;align-items:center;gap:10px}
        .vc-avatar{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;
            justify-content:center;font-size:18px;flex-shrink:0}
        .vc-avatar.male{background:#E3F2FD;color:var(--blue)}
        .vc-avatar.female{background:#FCE4EC;color:var(--pink)}
        .vc-avatar.other{background:#E8F5E9;color:var(--g600)}
        .vc-info{flex:1;min-width:0}
        .vc-name{font-size:13px;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .vc-lang{font-size:10px;color:var(--txtM);margin-top:2px;display:flex;align-items:center;gap:4px}
        .vc-badge{padding:2px 8px;border-radius:50px;font-size:9px;font-weight:700;display:inline-block}
        .vc-badge.local{background:var(--g100);color:var(--g800)}
        .vc-badge.remote{background:#E3F2FD;color:var(--blue)}
        .vc-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--g300);
            display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;
            transition:var(--t);flex-shrink:0}
        .voice-card.active .vc-check{background:var(--g600);border-color:var(--g600);color:#fff}
        .vc-test{margin-top:8px;padding:6px 12px;border:1.5px solid var(--g200);border-radius:7px;
            background:var(--w);color:var(--g800);font-size:11px;font-weight:600;cursor:pointer;
            transition:var(--t);font-family:inherit;display:inline-flex;align-items:center;gap:5px}
        .vc-test:hover{background:var(--g600);color:#fff;border-color:var(--g600)}

        /* Voice filter */
        .voice-filter{display:flex;gap:6px;margin-bottom:12px}
        .vf-input{flex:1;padding:9px 14px;border:2px solid var(--g200);border-radius:8px;font-size:12px;
            font-family:inherit;outline:none;transition:var(--t)}
        .vf-input:focus{border-color:var(--g500);box-shadow:0 0 0 3px rgba(76,175,80,.12)}
        .vf-count{font-size:11px;color:var(--txtM);font-weight:600;padding:9px 0;white-space:nowrap}

        /* Slider Group */
        .slider-group{margin-bottom:16px}
        .sl-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
        .sl-label{font-size:12px;font-weight:600;color:var(--txt);display:flex;align-items:center;gap:6px}
        .sl-label i{color:var(--g600)}
        .sl-val{font-size:12px;font-weight:800;color:var(--g900);background:var(--g100);
            padding:3px 10px;border-radius:50px;min-width:40px;text-align:center}
        .sl-wrap{position:relative}
        .sl-track{width:100%;height:8px;background:var(--g200);border-radius:10px;overflow:hidden}
        .sl-fill{height:100%;background:linear-gradient(90deg,var(--g400),var(--g600));border-radius:10px;transition:width .1s}
        .sl-range{position:absolute;top:-4px;left:0;width:100%;height:16px;-webkit-appearance:none;appearance:none;
            background:transparent;outline:none;cursor:pointer}
        .sl-range::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;
            background:var(--w);border:3px solid var(--g600);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.15)}
        .sl-presets{display:flex;gap:5px;margin-top:8px}
        .sl-preset{padding:5px 10px;border:1.5px solid var(--g200);border-radius:6px;font-size:10px;
            font-weight:600;cursor:pointer;transition:var(--t);background:var(--w);color:var(--txtL);font-family:inherit}
        .sl-preset:hover{border-color:var(--g500);background:var(--g50);color:var(--g800)}
        .sl-preset.active{background:var(--g600);color:#fff;border-color:var(--g600)}

        /* Sidebar footer */
        .sb-foot{flex-shrink:0;padding:14px 18px;border-top:1px solid var(--bdr);background:var(--g50)}
        .speak-btn-sb{width:100%;padding:14px;background:linear-gradient(135deg,var(--g600),var(--g900));
            color:#fff;border:none;border-radius:var(--rs);font-size:15px;font-weight:700;cursor:pointer;
            transition:var(--t);font-family:inherit;display:flex;align-items:center;justify-content:center;
            gap:10px;box-shadow:0 5px 20px rgba(46,125,50,.3);position:relative;overflow:hidden}
        .speak-btn-sb::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
            background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transition:.6s}
        .speak-btn-sb:hover::after{left:100%}
        .speak-btn-sb:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(46,125,50,.4)}

        /* ===== CENTER ===== */
        .center{flex:1;display:flex;flex-direction:column;overflow:hidden}

        /* Top Stats Bar */
        .top-bar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
            padding:8px 18px;background:var(--w);border-bottom:1px solid var(--bdr);gap:10px}
        .tb-left{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
        .tb-chip{display:flex;align-items:center;gap:5px;padding:5px 12px;background:var(--g50);
            border:1.5px solid var(--g200);border-radius:50px;font-size:11px;font-weight:700;color:var(--g800);
            white-space:nowrap}
        .tb-chip i{font-size:12px;color:var(--g600)}
        .tb-chip .tcn{color:var(--g900);font-size:13px;font-weight:900}
        .tb-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
        .tb-btn{height:32px;padding:0 14px;border:1.5px solid var(--g200);border-radius:8px;
            background:var(--w);color:var(--g800);font-size:11.5px;font-weight:600;cursor:pointer;
            transition:var(--t);font-family:inherit;display:flex;align-items:center;gap:5px}
        .tb-btn:hover{background:var(--g600);color:#fff;border-color:var(--g600)}

        /* TEXT EDITOR */
        .editor-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
        .text-editor{flex:1;padding:30px 40px;font-size:17px;font-family:'Inter',sans-serif;line-height:2;
            color:var(--txt);border:none;outline:none;resize:none;background:var(--w);overflow-y:auto}
        .text-editor::placeholder{color:var(--g300);font-weight:400}
        .text-editor::-webkit-scrollbar{width:8px}
        .text-editor::-webkit-scrollbar-track{background:var(--g50)}
        .text-editor::-webkit-scrollbar-thumb{background:var(--g300);border-radius:10px}

        /* ===== PLAYER BAR ===== */
        .player{flex-shrink:0;background:var(--w);border-top:2px solid var(--bdr);padding:0;
            display:flex;flex-direction:column;overflow:hidden;transition:max-height .4s ease;max-height:0}
        .player.show{max-height:300px}
        .player-inner{padding:16px 24px}

        /* Waveform */
        .wave-wrap{display:flex;align-items:center;justify-content:center;gap:3px;height:50px;margin-bottom:14px}
        .wave-bar{width:4px;border-radius:4px;background:var(--g300);transition:height .1s,background .2s;height:8px}
        .wave-bar.active{background:var(--g600)}

        /* Progress Bar */
        .prog-wrap{display:flex;align-items:center;gap:12px;margin-bottom:14px}
        .prog-time{font-size:11px;font-weight:700;color:var(--txtM);min-width:40px;text-align:center;font-variant-numeric:tabular-nums}
        .prog-track{flex:1;height:6px;background:var(--g200);border-radius:10px;overflow:hidden;cursor:pointer;position:relative}
        .prog-fill{height:100%;background:linear-gradient(90deg,var(--g400),var(--g600));border-radius:10px;width:0%;transition:width .3s}

        /* Controls */
        .controls{display:flex;align-items:center;justify-content:center;gap:12px}
        .ctrl-btn{width:44px;height:44px;border-radius:50%;border:2px solid var(--g200);background:var(--w);
            color:var(--g800);font-size:16px;cursor:pointer;transition:var(--t);display:flex;
            align-items:center;justify-content:center;flex-shrink:0}
        .ctrl-btn:hover{background:var(--g100);border-color:var(--g400)}
        .ctrl-play{width:56px;height:56px;background:linear-gradient(135deg,var(--g600),var(--g800));
            border:none;color:#fff;font-size:20px;box-shadow:0 4px 20px rgba(46,125,50,.3)}
        .ctrl-play:hover{transform:scale(1.06);box-shadow:0 6px 25px rgba(46,125,50,.4)}
        .ctrl-play.playing{background:linear-gradient(135deg,var(--orange),#F57C00)}

        /* Currently Speaking Info */
        .speak-info{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:12px}
        .si-voice{font-size:11px;font-weight:600;color:var(--txtM);display:flex;align-items:center;gap:5px}
        .si-voice i{color:var(--g600)}
        .si-dot{width:4px;height:4px;border-radius:50%;background:var(--g400)}

        /* ===== SAMPLE TEXTS ===== */
        .samples-section{padding:14px 18px;border-bottom:1px solid var(--bdr)}
        .sample-title{font-size:11px;font-weight:700;color:var(--g800);text-transform:uppercase;
            letter-spacing:.8px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
        .sample-title i{color:var(--g600);font-size:13px}
        .sample-grid{display:flex;flex-direction:column;gap:6px}
        .sample-btn{width:100%;padding:10px 14px;border:2px solid var(--g200);border-radius:var(--rs);
            background:var(--w);font-size:12px;font-weight:600;color:var(--txt);cursor:pointer;
            transition:var(--t);font-family:inherit;display:flex;align-items:center;gap:10px;text-align:left}
        .sample-btn:hover{border-color:var(--g500);background:var(--g50);transform:translateX(3px)}
        .sample-btn .s-emoji{font-size:20px;flex-shrink:0}
        .sample-btn .s-info{flex:1;min-width:0}
        .sample-btn .s-name{font-size:12px;font-weight:700;color:var(--txt)}
        .sample-btn .s-desc{font-size:10px;color:var(--txtM);margin-top:1px}

        /* ===== HISTORY ===== */
        .history-section{padding:14px 18px}
        .hist-title{font-size:11px;font-weight:700;color:var(--g800);text-transform:uppercase;
            letter-spacing:.8px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
        .hist-title i{color:var(--g600);font-size:13px}
        .hist-list{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto}
        .hist-list::-webkit-scrollbar{width:4px}
        .hist-list::-webkit-scrollbar-thumb{background:var(--g300);border-radius:10px}
        .hist-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--g50);
            border-radius:8px;cursor:pointer;transition:var(--t)}
        .hist-item:hover{background:var(--g100)}
        .hist-item .hi-play{width:28px;height:28px;border-radius:50%;background:var(--g600);color:#fff;
            display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;cursor:pointer;transition:var(--t)}
        .hist-item .hi-play:hover{background:var(--g800)}
        .hist-item .hi-text{flex:1;font-size:11px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .hist-item .hi-time{font-size:10px;color:var(--txtM);flex-shrink:0}
        .hist-empty{text-align:center;padding:20px;color:var(--txtM);font-size:12px}

        /* ===== STATUS BAR ===== */
        .status-bar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
            padding:6px 18px;background:var(--g800);color:rgba(255,255,255,.7);font-size:11px;font-weight:600;gap:16px}
        .status-bar .si{display:flex;align-items:center;gap:5px;white-space:nowrap}
        .status-bar .si i{font-size:12px;color:var(--g400)}
        .s-left,.s-right{display:flex;align-items:center;gap:16px}

        /* ===== OVERLAYS ===== */
        .sbov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90}
        .sbov.show{display:block}

        /* TOAST */
        .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
            background:var(--g900);color:#fff;padding:11px 26px;border-radius:50px;font-size:13px;
            font-weight:600;font-family:inherit;z-index:9999;box-shadow:0 8px 30px rgba(0,0,0,.25);
            opacity:0;transition:all .4s cubic-bezier(.4,0,.2,1);pointer-events:none;white-space:nowrap}
        .toast.show{transform:translateX(-50%) translateY(0);opacity:1}

        /* MOBILE BOTTOM BAR */
        .mobbar{display:none;flex-shrink:0;background:var(--w);border-top:1px solid var(--bdr);
            padding:6px 8px;gap:4px;z-index:80;overflow-x:auto}
        .mobbar::-webkit-scrollbar{height:0}
        .mobbar .mb{padding:8px 10px;background:var(--g50);border:1.5px solid var(--g200);
            border-radius:8px;font-size:10px;font-weight:600;color:var(--g800);cursor:pointer;
            transition:var(--t);font-family:inherit;display:flex;flex-direction:column;
            align-items:center;gap:2px;flex-shrink:0;min-width:52px}
        .mobbar .mb i{font-size:14px}
        .mobbar .mb.go{background:linear-gradient(135deg,var(--g600),var(--g800));color:#fff;
            border-color:var(--g600);box-shadow:0 3px 12px rgba(46,125,50,.3)}
        .mobbar .mb.stop-mb{background:var(--red);color:#fff;border-color:var(--red)}

        /* Voice list wrapper */
        .voice-list{max-height:300px;overflow-y:auto}
        .voice-list::-webkit-scrollbar{width:4px}
        .voice-list::-webkit-scrollbar-thumb{background:var(--g300);border-radius:10px}

        /* Highlight character */
        .highlight-overlay{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;
            padding:30px 40px;font-size:17px;font-family:'Inter',sans-serif;line-height:2;
            white-space:pre-wrap;word-wrap:break-word;overflow:hidden;z-index:1}

        /* RESPONSIVE */
        @media(max-width:900px){
            .nb.desk{display:none}.mmenu{display:flex}.mobbar{display:flex}
            .sb{position:fixed;left:-330px;top:0;bottom:0;z-index:100;
                transition:left var(--t);box-shadow:var(--shL)}
            .sb.open{left:0}.sb-close{display:flex}
            .nav{height:50px;padding:0 12px}
            .logo-t{font-size:15px}
            .logo-ic{width:32px;height:32px;font-size:15px;border-radius:8px}
            .text-editor{padding:20px;font-size:15px;line-height:1.8}
            .top-bar{padding:6px 12px}
            .tb-right{display:none}
            .player-inner{padding:12px 16px}
        }
        @media(max-width:480px){
            .text-editor{padding:16px;font-size:14px;line-height:1.7}
            .tb-left{gap:4px}
            .tb-chip{padding:4px 8px;font-size:10px}
            .tb-chip .tcn{font-size:11px}
            .controls{gap:8px}
            .ctrl-btn{width:38px;height:38px;font-size:14px}
            .ctrl-play{width:48px;height:48px;font-size:18px}
        }
    </style>
</head>
<body>

<div class="app">
    <!-- ===== NAVBAR ===== -->
    <nav class="nav">
        <div class="nav-left">
            <button class="mmenu" onclick="toggleSB()"><i class="fas fa-bars"></i></button>
            <div class="logo-ic"><i class="fas fa-volume-up"></i></div>
            <div class="logo-t">Text<span>2Speech</span></div>
        </div>
        <div class="nav-right">
            <button class="nb desk" onclick="toggleSB()"><i class="fas fa-microphone-alt"></i> Voices</button>
            <button class="nb desk" onclick="clearText()"><i class="fas fa-eraser"></i> Clear</button>
            <button class="nb yel" onclick="speak()"><i class="fas fa-play"></i> Speak</button>
        </div>
    </nav>

    <!-- ===== MAIN ===== -->
    <div class="main">
        <div class="sbov" id="sbov" onclick="closeSB()"></div>

        <!-- ===== SIDEBAR ===== -->
        <div class="sb" id="sidebar">
            <div class="sb-hdr">
                <div class="sb-title"><i class="fas fa-microphone-alt"></i> Voice Settings</div>
                <button class="sb-close" onclick="closeSB()"><i class="fas fa-times"></i></button>
            </div>
            <div class="sb-scroll">

                <!-- SPEED -->
                <div class="sg">
                    <div class="slider-group">
                        <div class="sl-header">
                            <div class="sl-label"><i class="fas fa-tachometer-alt"></i> Speed</div>
                            <div class="sl-val" id="speedVal">1.0x</div>
                        </div>
                        <div class="sl-wrap">
                            <div class="sl-track"><div class="sl-fill" id="speedFill" style="width:50%"></div></div>
                            <input type="range" class="sl-range" id="speedRange" min="0.25" max="2" step="0.05" value="1"
                                oninput="updateSlider('speed',this.value)">
                        </div>
                        <div class="sl-presets">
                            <button class="sl-preset" onclick="setSpeed(0.5)">0.5x</button>
                            <button class="sl-preset" onclick="setSpeed(0.75)">0.75x</button>
                            <button class="sl-preset active" onclick="setSpeed(1)">1.0x</button>
                            <button class="sl-preset" onclick="setSpeed(1.25)">1.25x</button>
                            <button class="sl-preset" onclick="setSpeed(1.5)">1.5x</button>
                            <button class="sl-preset" onclick="setSpeed(2)">2.0x</button>
                        </div>
                    </div>
                </div>

                <!-- PITCH -->
                <div class="sg">
                    <div class="slider-group">
                        <div class="sl-header">
                            <div class="sl-label"><i class="fas fa-music"></i> Pitch</div>
                            <div class="sl-val" id="pitchVal">1.0</div>
                        </div>
                        <div class="sl-wrap">
                            <div class="sl-track"><div class="sl-fill" id="pitchFill" style="width:50%"></div></div>
                            <input type="range" class="sl-range" id="pitchRange" min="0" max="2" step="0.1" value="1"
                                oninput="updateSlider('pitch',this.value)">
                        </div>
                        <div class="sl-presets">
                            <button class="sl-preset" onclick="setPitch(0.5)">Low</button>
                            <button class="sl-preset active" onclick="setPitch(1)">Normal</button>
                            <button class="sl-preset" onclick="setPitch(1.5)">High</button>
                            <button class="sl-preset" onclick="setPitch(2)">Very High</button>
                        </div>
                    </div>
                </div>

                <!-- VOLUME -->
                <div class="sg">
                    <div class="slider-group">
                        <div class="sl-header">
                            <div class="sl-label"><i class="fas fa-volume-up"></i> Volume</div>
                            <div class="sl-val" id="volVal">100%</div>
                        </div>
                        <div class="sl-wrap">
                            <div class="sl-track"><div class="sl-fill" id="volFill" style="width:100%"></div></div>
                            <input type="range" class="sl-range" id="volRange" min="0" max="1" step="0.05" value="1"
                                oninput="updateSlider('vol',this.value)">
                        </div>
                    </div>
                </div>

                <!-- VOICE SELECTION -->
                <div class="sg">
                    <div class="sgl"><i class="fas fa-user-circle"></i> Select Voice</div>
                    <div class="voice-filter">
                        <input type="text" class="vf-input" id="voiceSearch" placeholder="🔍 Search voices..." oninput="filterVoices()">
                        <div class="vf-count" id="voiceCount">0 voices</div>
                    </div>
                    <div class="voice-list" id="voiceList">
                        <div style="text-align:center;padding:20px;color:var(--txtM)">Loading voices...</div>
                    </div>
                </div>

                <!-- SAMPLE TEXTS -->
                <div class="samples-section">
                    <div class="sample-title"><i class="fas fa-bookmark"></i> Sample Texts</div>
                    <div class="sample-grid">
                        <button class="sample-btn" onclick="loadSample('greeting')">
                            <span class="s-emoji">👋</span>
                            <span class="s-info"><span class="s-name">Greeting</span><span class="s-desc">Hello & welcome message</span></span>
                        </button>
                        <button class="sample-btn" onclick="loadSample('story')">
                            <span class="s-emoji">📖</span>
                            <span class="s-info"><span class="s-name">Short Story</span><span class="s-desc">A little fairy tale</span></span>
                        </button>
                        <button class="sample-btn" onclick="loadSample('news')">
                            <span class="s-emoji">📰</span>
                            <span class="s-info"><span class="s-name">News Anchor</span><span class="s-desc">Breaking news style</span></span>
                        </button>
                        <button class="sample-btn" onclick="loadSample('poem')">
                            <span class="s-emoji">🎭</span>
                            <span class="s-info"><span class="s-name">Poetry</span><span class="s-desc">Beautiful English poem</span></span>
                        </button>
                        <button class="sample-btn" onclick="loadSample('motivational')">
                            <span class="s-emoji">🔥</span>
                            <span class="s-info"><span class="s-name">Motivational</span><span class="s-desc">Inspiring speech</span></span>
                        </button>
                        <button class="sample-btn" onclick="loadSample('urdu')">
                            <span class="s-emoji">🇵🇰</span>
                            <span class="s-info"><span class="s-name">Urdu Text</span><span class="s-desc">Urdu paragraph sample</span></span>
                        </button>
                    </div>
                </div>

                <!-- HISTORY -->
                <div class="history-section">
                    <div class="hist-title"><i class="fas fa-history"></i> Recent History</div>
                    <div class="hist-list" id="histList">
                        <div class="hist-empty">No history yet</div>
                    </div>
                </div>

            </div>
            <div class="sb-foot">
                <button class="speak-btn-sb" onclick="speak()"><i class="fas fa-play"></i> Start Speaking</button>
            </div>
        </div>

        <!-- ===== CENTER ===== -->
        <div class="center">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="tb-left">
                    <div class="tb-chip"><i class="fas fa-font"></i> Words: <span class="tcn" id="tWords">0</span></div>
                    <div class="tb-chip"><i class="fas fa-text-width"></i> Chars: <span class="tcn" id="tChars">0</span></div>
                    <div class="tb-chip"><i class="fas fa-clock"></i> Est: <span class="tcn" id="tEst">0s</span></div>
                    <div class="tb-chip"><i class="fas fa-microphone-alt"></i> <span class="tcn" id="tVoice">Default</span></div>
                </div>
                <div class="tb-right">
                    <button class="tb-btn" onclick="clearText()"><i class="fas fa-eraser"></i> Clear</button>
                    <button class="tb-btn" onclick="copyText()"><i class="fas fa-copy"></i> Copy</button>
                    <button class="tb-btn" onclick="pasteText()"><i class="fas fa-paste"></i> Paste</button>
                </div>
            </div>

            <!-- Text Editor -->
            <div class="editor-wrap">
                <textarea class="text-editor" id="editor" placeholder="✏️ Type or paste your text here...

Then click the ▶ Speak button to hear it read aloud!

🎯 Features:
• Multiple voices & languages
• Speed, pitch & volume control
• Real-time word highlighting
• History of recent speeches
• Sample texts to try
• Works 100% offline!

🌍 Supports English, Urdu, Hindi, Arabic, Chinese, Spanish, French, German and many more languages!" spellcheck="true"></textarea>
            </div>

            <!-- PLAYER BAR -->
            <div class="player" id="playerBar">
                <div class="player-inner">
                    <!-- Waveform -->
                    <div class="wave-wrap" id="waveWrap"></div>

                    <!-- Progress -->
                    <div class="prog-wrap">
                        <span class="prog-time" id="progElapsed">0:00</span>
                        <div class="prog-track" id="progTrack">
                            <div class="prog-fill" id="progFill"></div>
                        </div>
                        <span class="prog-time" id="progTotal">0:00</span>
                    </div>

                    <!-- Controls -->
                    <div class="controls">
                        <button class="ctrl-btn" onclick="skipBack()" title="Restart"><i class="fas fa-backward"></i></button>
                        <button class="ctrl-btn" onclick="slowDown()" title="Slower"><i class="fas fa-minus"></i></button>
                        <button class="ctrl-play" id="playBtn" onclick="togglePlayPause()" title="Play/Pause"><i class="fas fa-play" id="playIcon"></i></button>
                        <button class="ctrl-btn" onclick="speedUp()" title="Faster"><i class="fas fa-plus"></i></button>
                        <button class="ctrl-btn" onclick="stopSpeech()" title="Stop"><i class="fas fa-stop"></i></button>
                    </div>

                    <!-- Speaking Info -->
                    <div class="speak-info">
                        <span class="si-voice"><i class="fas fa-user-circle"></i> <span id="siVoice">-</span></span>
                        <span class="si-dot"></span>
                        <span class="si-voice"><i class="fas fa-tachometer-alt"></i> <span id="siSpeed">1.0x</span></span>
                        <span class="si-dot"></span>
                        <span class="si-voice"><i class="fas fa-music"></i> Pitch: <span id="siPitch">1.0</span></span>
                    </div>
                </div>
            </div>

            <!-- Status Bar -->
            <div class="status-bar">
                <div class="s-left">
                    <div class="si"><i class="fas fa-font"></i> <span id="bWords">0</span> words</div>
                    <div class="si"><i class="fas fa-text-width"></i> <span id="bChars">0</span> chars</div>
                    <div class="si"><i class="fas fa-clock"></i> <span id="bEst">~0s</span></div>
                </div>
                <div class="s-right">
                    <div class="si" id="bStatus"><i class="fas fa-circle" style="color:var(--g400);font-size:8px"></i> Ready</div>
                </div>
            </div>
        </div>
    </div>

    <!-- MOBILE BOTTOM BAR -->
    <div class="mobbar" id="mobbar">
        <button class="mb" onclick="toggleSB()"><i class="fas fa-microphone-alt"></i>Voices</button>
        <button class="mb" onclick="clearText()"><i class="fas fa-eraser"></i>Clear</button>
        <button class="mb" onclick="pasteText()"><i class="fas fa-paste"></i>Paste</button>
        <button class="mb" onclick="copyText()"><i class="fas fa-copy"></i>Copy</button>
        <button class="mb go" id="mobPlayBtn" onclick="togglePlayPause()"><i class="fas fa-play" id="mobPlayIcon"></i>Speak</button>
        <button class="mb stop-mb" onclick="stopSpeech()"><i class="fas fa-stop"></i>Stop</button>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
    // ========== STATE ==========
    const editor = document.getElementById('editor');
    const synth = window.speechSynthesis;
    let voices = [];
    let selectedVoice = null;
    let currentUtterance = null;
    let isSpeaking = false;
    let isPaused = false;
    let history = [];
    let startTime = 0;
    let estimatedDuration = 0;
    let progressInterval = null;
    let waveInterval = null;

    // ========== INIT VOICES ==========
    function loadVoices() {
        voices = synth.getVoices();
        renderVoiceList();
    }
    synth.onvoiceschanged = loadVoices;
    loadVoices();
    setTimeout(loadVoices, 500);
    setTimeout(loadVoices, 1500);

    function renderVoiceList(filter = '') {
        const list = document.getElementById('voiceList');
        const filtered = voices.filter(v => {
            const search = filter.toLowerCase();
            return v.name.toLowerCase().includes(search) || v.lang.toLowerCase().includes(search);
        });

        document.getElementById('voiceCount').textContent = filtered.length + ' voices';
        if (!filtered.length) {
            list.innerHTML = '<div style="text-align:center;padding:20px;color:var(--txtM)">No voices found</div>';
            return;
        }

        let html = '';
        filtered.forEach((v, i) => {
            const isActive = selectedVoice && selectedVoice.name === v.name;
            const gender = v.name.toLowerCase().match(/female|woman|zira|hazel|susan|samantha|karen|moira|fiona|tessa|victoria/)
                ? 'female' : v.name.toLowerCase().match(/male|man|david|james|daniel|alex|fred|rishi|jorge|thomas/)
                ? 'male' : 'other';
            const genderIcon = gender === 'female' ? 'fa-venus' : gender === 'male' ? 'fa-mars' : 'fa-robot';
            const isLocal = v.localService;

            html += `<div class="voice-card ${isActive ? 'active' : ''}" onclick="selectVoice(${voices.indexOf(v)})">
                <div class="vc-top">
                    <div class="vc-avatar ${gender}"><i class="fas ${genderIcon}"></i></div>
                    <div class="vc-info">
                        <div class="vc-name">${escHtml(v.name)}</div>
                        <div class="vc-lang">
                            🌐 ${v.lang}
                            <span class="vc-badge ${isLocal ? 'local' : 'remote'}">${isLocal ? '💻 Local' : '☁️ Online'}</span>
                        </div>
                    </div>
                    <div class="vc-check"><i class="fas fa-check"></i></div>
                </div>
                <button class="vc-test" onclick="event.stopPropagation();testVoice(${voices.indexOf(v)})">
                    <i class="fas fa-play"></i> Test
                </button>
            </div>`;
        });
        list.innerHTML = html;
    }

    function filterVoices() {
        renderVoiceList(document.getElementById('voiceSearch').value);
    }

    function selectVoice(idx) {
        selectedVoice = voices[idx];
        renderVoiceList(document.getElementById('voiceSearch').value);
        document.getElementById('tVoice').textContent = selectedVoice.name.split(' ').slice(0, 2).join(' ');
        toast('Voice: ' + selectedVoice.name.split(' ').slice(0, 3).join(' ') + ' ✅');
    }

    function testVoice(idx) {
        synth.cancel();
        const u = new SpeechSynthesisUtterance('Hello! This is a test of this voice. How does it sound?');
        u.voice = voices[idx];
        u.rate = parseFloat(document.getElementById('speedRange').value);
        u.pitch = parseFloat(document.getElementById('pitchRange').value);
        u.volume = parseFloat(document.getElementById('volRange').value);
        synth.speak(u);
    }

    // ========== SLIDERS ==========
    function updateSlider(type, val) {
        if (type === 'speed') {
            document.getElementById('speedVal').textContent = parseFloat(val).toFixed(2) + 'x';
            document.getElementById('speedFill').style.width = ((val - 0.25) / 1.75 * 100) + '%';
            updateSpeedPresets(val);
        } else if (type === 'pitch') {
            document.getElementById('pitchVal').textContent = parseFloat(val).toFixed(1);
            document.getElementById('pitchFill').style.width = (val / 2 * 100) + '%';
            updatePitchPresets(val);
        } else if (type === 'vol') {
            document.getElementById('volVal').textContent = Math.round(val * 100) + '%';
            document.getElementById('volFill').style.width = (val * 100) + '%';
        }
        updateEstimate();
    }

    function setSpeed(v) {
        document.getElementById('speedRange').value = v;
        updateSlider('speed', v);
    }
    function setPitch(v) {
        document.getElementById('pitchRange').value = v;
        updateSlider('pitch', v);
    }
    function updateSpeedPresets(v) {
        document.querySelectorAll('#speedRange').closest('.slider-group').querySelectorAll('.sl-preset')
        // Simplified approach
        const presets = document.getElementById('speedRange').parentElement.parentElement.parentElement.querySelectorAll('.sl-preset');
        presets.forEach(p => {
            const pv = parseFloat(p.textContent);
            p.classList.toggle('active', Math.abs(pv - parseFloat(v)) < 0.05);
        });
    }
    function updatePitchPresets(v) {
        // handled visually
    }

    // ========== TEXT ANALYSIS ==========
    editor.addEventListener('input', analyzeText);
    function analyzeText() {
        const text = editor.value.trim();
        const words = text ? text.split(/\s+/).filter(w => w.length > 0) : [];
        const chars = editor.value.length;
        const wordCount = words.length;

        document.getElementById('tWords').textContent = wordCount.toLocaleString();
        document.getElementById('tChars').textContent = chars.toLocaleString();
        document.getElementById('bWords').textContent = wordCount.toLocaleString();
        document.getElementById('bChars').textContent = chars.toLocaleString();

        updateEstimate();
    }

    function updateEstimate() {
        const text = editor.value.trim();
        const words = text ? text.split(/\s+/).filter(w => w.length > 0) : [];
        const speed = parseFloat(document.getElementById('speedRange').value);
        // Avg speaking rate ~150 wpm at 1x
        const minutes = words.length / (150 * speed);
        const est = formatTime(minutes);
        document.getElementById('tEst').textContent = est;
        document.getElementById('bEst').textContent = '~' + est;
        estimatedDuration = minutes * 60;
    }

    function formatTime(min) {
        if (min < 1) return Math.max(0, Math.round(min * 60)) + 's';
        const m = Math.floor(min);
        const s = Math.round((min - m) * 60);
        return m + ':' + String(s).padStart(2, '0');
    }

    function formatSec(sec) {
        const m = Math.floor(sec / 60);
        const s = Math.round(sec % 60);
        return m + ':' + String(s).padStart(2, '0');
    }

    // ========== SPEAK ==========
    function speak() {
        const text = editor.value.trim();
        if (!text) { toast('Type some text first ⚠️'); return; }

        synth.cancel();
        closeSB();

        currentUtterance = new SpeechSynthesisUtterance(text);
        if (selectedVoice) currentUtterance.voice = selectedVoice;
        currentUtterance.rate = parseFloat(document.getElementById('speedRange').value);
        currentUtterance.pitch = parseFloat(document.getElementById('pitchRange').value);
        currentUtterance.volume = parseFloat(document.getElementById('volRange').value);

        // Show player
        document.getElementById('playerBar').classList.add('show');

        // Update info
        document.getElementById('siVoice').textContent = selectedVoice ? selectedVoice.name.split(' ').slice(0, 2).join(' ') : 'Default';
        document.getElementById('siSpeed').textContent = currentUtterance.rate.toFixed(2) + 'x';
        document.getElementById('siPitch').textContent = currentUtterance.pitch.toFixed(1);
        document.getElementById('progTotal').textContent = formatSec(estimatedDuration);

        currentUtterance.onstart = () => {
            isSpeaking = true; isPaused = false;
            startTime = Date.now();
            updatePlayBtn(true);
            setStatus('Speaking...', 'var(--g600)');
            startWave();
            startProgress();
        };

        currentUtterance.onend = () => {
            isSpeaking = false; isPaused = false;
            updatePlayBtn(false);
            setStatus('Finished ✅', 'var(--g400)');
            stopWave();
            stopProgress();
            document.getElementById('progFill').style.width = '100%';
            // Add to history
            addHistory(text);
        };

        currentUtterance.onerror = () => {
            isSpeaking = false;
            updatePlayBtn(false);
            setStatus('Error ❌', 'var(--red)');
            stopWave(); stopProgress();
        };

        currentUtterance.onpause = () => {
            isPaused = true;
            updatePlayBtn(false);
            setStatus('Paused ⏸️', 'var(--orange)');
            stopWave();
        };

        currentUtterance.onresume = () => {
            isPaused = false;
            updatePlayBtn(true);
            setStatus('Speaking...', 'var(--g600)');
            startWave();
        };

        synth.speak(currentUtterance);
    }

    function togglePlayPause() {
        if (!isSpeaking && !isPaused) {
            speak();
            return;
        }
        if (isPaused) {
            synth.resume();
        } else {
            synth.pause();
        }
    }

    function stopSpeech() {
        synth.cancel();
        isSpeaking = false; isPaused = false;
        updatePlayBtn(false);
        setStatus('Stopped ⏹️', 'var(--red)');
        stopWave(); stopProgress();
        document.getElementById('progFill').style.width = '0%';
        document.getElementById('progElapsed').textContent = '0:00';
    }

    function skipBack() {
        stopSpeech();
        speak();
    }

    function slowDown() {
        let s = parseFloat(document.getElementById('speedRange').value);
        s = Math.max(0.25, s - 0.25);
        setSpeed(s);
        if (isSpeaking) { stopSpeech(); speak(); }
        toast('Speed: ' + s.toFixed(2) + 'x');
    }

    function speedUp() {
        let s = parseFloat(document.getElementById('speedRange').value);
        s = Math.min(2, s + 0.25);
        setSpeed(s);
        if (isSpeaking) { stopSpeech(); speak(); }
        toast('Speed: ' + s.toFixed(2) + 'x');
    }

    function updatePlayBtn(playing) {
        const icon = document.getElementById('playIcon');
        const btn = document.getElementById('playBtn');
        const mIcon = document.getElementById('mobPlayIcon');
        icon.className = playing ? 'fas fa-pause' : 'fas fa-play';
        btn.classList.toggle('playing', playing);
        mIcon.className = playing ? 'fas fa-pause' : 'fas fa-play';
    }

    function setStatus(text, color) {
        document.getElementById('bStatus').innerHTML = `<i class="fas fa-circle" style="color:${color};font-size:8px"></i> ${text}`;
    }

    // ========== WAVEFORM ==========
    function initWave() {
        const wrap = document.getElementById('waveWrap');
        wrap.innerHTML = '';
        for (let i = 0; i < 50; i++) {
            const bar = document.createElement('div');
            bar.className = 'wave-bar';
            wrap.appendChild(bar);
        }
    }
    initWave();

    function startWave() {
        const bars = document.querySelectorAll('.wave-bar');
        stopWave();
        waveInterval = setInterval(() => {
            bars.forEach(bar => {
                const h = Math.random() * 40 + 6;
                bar.style.height = h + 'px';
                bar.classList.add('active');
            });
        }, 100);
    }

    function stopWave() {
        clearInterval(waveInterval);
        document.querySelectorAll('.wave-bar').forEach(bar => {
            bar.style.height = '8px';
            bar.classList.remove('active');
        });
    }

    // ========== PROGRESS ==========
    function startProgress() {
        stopProgress();
        progressInterval = setInterval(() => {
            if (!isSpeaking || isPaused) return;
            const elapsed = (Date.now() - startTime) / 1000;
            const pct = estimatedDuration > 0 ? Math.min(100, (elapsed / estimatedDuration) * 100) : 0;
            document.getElementById('progFill').style.width = pct + '%';
            document.getElementById('progElapsed').textContent = formatSec(elapsed);
        }, 200);
    }

    function stopProgress() {
        clearInterval(progressInterval);
    }

    // ========== HISTORY ==========
    function addHistory(text) {
        const item = {
            text: text.substring(0, 100),
            fullText: text,
            time: new Date().toLocaleTimeString(),
            voice: selectedVoice ? selectedVoice.name.split(' ').slice(0, 2).join(' ') : 'Default'
        };
        history.unshift(item);
        if (history.length > 20) history.pop();
        renderHistory();
    }

    function renderHistory() {
        const list = document.getElementById('histList');
        if (!history.length) {
            list.innerHTML = '<div class="hist-empty">No history yet</div>';
            return;
        }
        let html = '';
        history.forEach((item, i) => {
            html += `<div class="hist-item">
                <div class="hi-play" onclick="replayHistory(${i})"><i class="fas fa-play"></i></div>
                <div class="hi-text" title="${escHtml(item.text)}">${escHtml(item.text)}</div>
                <div class="hi-time">${item.time}</div>
            </div>`;
        });
        list.innerHTML = html;
    }

    function replayHistory(idx) {
        editor.value = history[idx].fullText;
        analyzeText();
        speak();
    }

    // ========== SAMPLE TEXTS ==========
    const samples = {
        greeting: "Hello and welcome! Thank you for visiting our Text to Speech tool. This is an amazing free online tool that converts your written text into natural sounding speech. You can choose from many different voices, adjust the speed, pitch, and volume. Try it out and enjoy the experience!",

        story: "Once upon a time, in a magical forest far away, there lived a little rabbit named Luna. She had the softest white fur and the brightest blue eyes. Every morning, Luna would hop through the meadow, collecting wildflowers for her grandmother. One special day, she found a golden key hidden beneath an old oak tree. The key led her to a secret garden where butterflies danced and flowers sang melodies. From that day on, Luna visited her magical garden every evening, and she was never lonely again.",

        news: "Good evening, and welcome to the evening news. Breaking tonight: Scientists have made a groundbreaking discovery that could change the way we understand our universe. In a landmark study published today, researchers revealed evidence of water on a distant exoplanet, raising new possibilities in the search for extraterrestrial life. Meanwhile, in technology news, a revolutionary new artificial intelligence system has demonstrated the ability to compose music indistinguishable from human compositions. Stay tuned for more details after the break.",

        poem: "Two roads diverged in a yellow wood, and sorry I could not travel both. I stood and looked down one as far as I could, to where it bent in the undergrowth. Then took the other, just as fair, and having perhaps the better claim. I shall be telling this with a sigh, somewhere ages and ages hence. Two roads diverged in a wood, and I took the one less traveled by, and that has made all the difference.",

        motivational: "Listen to me carefully. You are capable of achieving incredible things. Every great achievement in history started with a single step, a single decision to try. Do not let fear hold you back. Do not let doubt whisper in your ear that you cannot do it. You are stronger than you think. You are smarter than you believe. And you are braver than you feel. Today is your day. Stand up, take action, and make your dreams a reality. The world is waiting for your greatness. Go out there and shine!",

        urdu: "آج کا دن بہت خوبصورت ہے۔ آسمان صاف ہے اور ہوا خوشگوار ہے۔ پرندے درختوں پر چہچہا رہے ہیں اور پھول کھل رہے ہیں۔ یہ ایک نئے دن کی شروعات ہے، نئے عزائم کے ساتھ۔ آئیے مل کر اس دنیا کو ایک بہتر جگہ بنائیں۔ ہمیں ایک دوسرے سے محبت اور احترام کرنا چاہیے۔"
    };

    function loadSample(key) {
        editor.value = samples[key] || '';
        analyzeText();
        toast('Sample loaded ✅');
        closeSB();
    }

    // ========== TEXT OPERATIONS ==========
    function clearText() { editor.value = ''; analyzeText(); toast('Cleared ✅'); }
    function copyText() { navigator.clipboard.writeText(editor.value); toast('Copied 📋'); }
    async function pasteText() {
        try { const t = await navigator.clipboard.readText(); editor.value += t; analyzeText(); toast('Pasted 📋'); }
        catch (e) { toast('Paste failed ⚠️'); }
    }

    // ========== SIDEBAR ==========
    function toggleSB() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sbov').classList.toggle('show'); }
    function closeSB() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sbov').classList.remove('show'); }

    // ========== HELPERS ==========
    function escHtml(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
    function toast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }

    // Init
    analyzeText();

    // Fix Chrome speech synthesis pause bug
    setInterval(() => {
        if (synth.speaking && !synth.paused) {
            synth.pause();
            synth.resume();
        }
    }, 10000);
</script>
</body>
</html>
