<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Formatter Tool</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --g50:#f0fdf4;--g100:#dcfce7;--g200:#bbf7d0;--g300:#86efac;
  --g400:#4ade80;--g500:#22c55e;--g600:#16a34a;--g700:#15803d;
  --g800:#166534;--g900:#14532d;
  --card:#ffffff;--text:#14532d;--text2:#166534;--text3:#15803d;
  --border:#bbf7d0;--border2:#dcfce7;
  --red:#dc2626;--orange:#ea580c;--blue:#2563eb;--purple:#9333ea;
  --cyan:#0891b2;--yellow:#ca8a04;--pink:#db2777;
  --shadow:0 8px 40px rgba(22,163,74,.13);
  --shadow-sm:0 4px 18px rgba(22,163,74,.08);
  --radius:16px;--radius-sm:10px;
  --mono:'Cascadia Code','Fira Code','Consolas','Monaco',monospace;
}
html,body{height:100%;width:100%}
body{
  min-height:100vh;
  background:linear-gradient(145deg,var(--g50) 0%,var(--g100) 40%,var(--g200) 100%);
  font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
  color:var(--text);
  display:flex;flex-direction:column;
}

/* ══════ HEADER ══════ */
.header{
  background:linear-gradient(135deg,var(--g500) 0%,var(--g700) 100%);
  padding:22px 28px 18px;text-align:center;
  position:relative;overflow:hidden;
  flex-shrink:0;
}
.header::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 30% 0%,rgba(255,255,255,.12) 0%,transparent 60%);
  pointer-events:none;
}
.header .logo{
  display:inline-flex;align-items:center;gap:10px;
  justify-content:center;flex-wrap:wrap;
}
.header .icon{font-size:38px;animation:bounce 2.5s ease infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.header h1{color:#fff;font-size:24px;font-weight:800;letter-spacing:.5px}
.header p{color:var(--g200);font-size:13px;margin-top:4px}

/* ══════ TOOLBAR ══════ */
.toolbar{
  background:var(--card);
  border-bottom:1.5px solid var(--border2);
  padding:12px 18px;
  display:flex;flex-wrap:wrap;align-items:center;gap:10px;
  flex-shrink:0;
}
.tool-grp{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tool-grp label{font-size:12px;font-weight:700;color:var(--g800);white-space:nowrap}
.tool-sel{
  padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;
  font-size:12.5px;color:var(--text);background:var(--g50);
  outline:none;cursor:pointer;transition:.3s;
}
.tool-sel:focus{border-color:var(--g500);box-shadow:0 0 0 3px rgba(34,197,94,.18)}
.tool-chk{display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none}
.tool-chk input[type=checkbox]{width:16px;height:16px;accent-color:var(--g600);cursor:pointer}
.tool-chk span{font-size:12px;font-weight:700;color:var(--g800)}
.spacer{flex:1}

/* ══════ BUTTONS ══════ */
.btn{
  padding:8px 16px;border:none;border-radius:var(--radius-sm);
  font-size:12.5px;font-weight:700;cursor:pointer;
  display:inline-flex;align-items:center;gap:5px;
  transition:all .25s ease;white-space:nowrap;
}
.btn:active{transform:scale(.97)!important}
.btn-format{
  background:linear-gradient(135deg,var(--g500),var(--g700));
  color:#fff;box-shadow:0 4px 14px rgba(22,163,74,.3);
}
.btn-format:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(22,163,74,.4)}
.btn-copy{background:#ecfdf5;color:var(--g700);border:1.5px solid var(--g300)}
.btn-copy:hover{background:#d1fae5;transform:translateY(-1px)}
.btn-clear{background:#fef2f2;color:var(--red);border:1.5px solid #fecaca}
.btn-clear:hover{background:#fee2e2;transform:translateY(-1px)}
.btn-paste{background:var(--g50);color:var(--g700);border:1.5px solid var(--border)}
.btn-paste:hover{background:var(--g100);transform:translateY(-1px)}
.btn-minify{background:#fefce8;color:var(--yellow);border:1.5px solid #fde68a}
.btn-minify:hover{background:#fef9c3;transform:translateY(-1px)}
.btn-sample{background:#f0f9ff;color:var(--blue);border:1.5px solid #bfdbfe}
.btn-sample:hover{background:#dbeafe;transform:translateY(-1px)}
.btn-download{background:var(--g50);color:var(--g700);border:1.5px solid var(--g300)}
.btn-download:hover{background:var(--g100);transform:translateY(-1px)}

/* ══════ MAIN PANELS ══════ */
.main{
  display:flex;flex-wrap:wrap;
  flex:1;overflow:hidden;
  background:var(--card);
}
.panel{
  flex:1 1 380px;display:flex;flex-direction:column;
  min-height:0;overflow:hidden;
}
.panel+.panel{border-left:1.5px solid var(--border2)}
.panel-head{
  padding:10px 16px;
  background:var(--g50);border-bottom:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.panel-head h3{
  font-size:13.5px;font-weight:800;color:var(--g800);
  display:flex;align-items:center;gap:6px;
}
.badge{
  font-size:10.5px;padding:2px 9px;border-radius:20px;
  background:var(--g100);color:var(--g700);font-weight:700;
}

/* Input Textarea */
#sqlInput{
  flex:1;width:100%;padding:16px;border:none;outline:none;
  font-family:var(--mono);font-size:13.5px;line-height:1.75;
  color:var(--text);background:transparent;resize:none;tab-size:2;
}
#sqlInput::placeholder{color:var(--g400)}

/* Output Pre */
.output-wrap{flex:1;overflow:auto;position:relative;background:#fafffe}
#sqlOutput{
  width:100%;min-height:100%;padding:16px;margin:0;
  font-family:var(--mono);font-size:13.5px;line-height:1.75;
  white-space:pre;overflow:auto;
  background:transparent;color:var(--text);border:none;
}

/* Line Numbers */
.line-nums{
  position:absolute;left:0;top:0;
  padding:16px 8px 16px 10px;
  font-family:var(--mono);font-size:13.5px;line-height:1.75;
  color:var(--g400);text-align:right;
  user-select:none;pointer-events:none;
  border-right:1px solid var(--border2);
  background:var(--g50);min-height:100%;
}

/* ══════ SYNTAX HIGHLIGHTING ══════ */
.sk{color:var(--g700);font-weight:700}
.sf{color:var(--orange);font-weight:600}
.ss{color:#16a34a}
.sn{color:var(--red)}
.sc{color:#94a3b8;font-style:italic}
.so{color:var(--cyan);font-weight:700}
.sp{color:var(--purple);font-weight:700}
.scm{color:#64748b}
.sa{color:var(--pink);font-weight:600}

/* ══════ STATUSBAR ══════ */
.statusbar{
  background:var(--card);
  padding:10px 18px;
  display:flex;flex-wrap:wrap;align-items:center;gap:14px;
  border-top:1.5px solid var(--border2);
  flex-shrink:0;
}
.stat{
  font-size:11.5px;color:var(--g700);font-weight:600;
  display:flex;align-items:center;gap:4px;
}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot-g{background:var(--g500)}
.dot-b{background:var(--blue)}
.stat-sep{width:1px;height:14px;background:var(--border);margin:0 2px}
.shortcut-hint{
  font-size:11px;color:var(--g400);font-weight:500;margin-left:auto;
}
.shortcut-hint kbd{
  background:var(--g100);padding:1px 6px;border-radius:4px;
  font-size:10.5px;border:1px solid var(--border);color:var(--g700);
  font-family:var(--mono);
}

/* ══════ TOAST ══════ */
.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(80px);
  padding:11px 24px;border-radius:12px;
  font-size:13.5px;font-weight:700;color:#fff;
  z-index:9999;pointer-events:none;
  transition:all .4s ease;opacity:0;
  backdrop-filter:blur(8px);
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast-success{background:rgba(22,163,74,.92);box-shadow:0 6px 24px rgba(22,163,74,.3)}
.toast-error{background:rgba(220,38,38,.92);box-shadow:0 6px 24px rgba(220,38,38,.3)}
.toast-info{background:rgba(37,99,235,.92);box-shadow:0 6px 24px rgba(37,99,235,.3)}

/* ══════ SCROLLBAR ══════ */
::-webkit-scrollbar{width:7px;height:7px}
::-webkit-scrollbar-track{background:var(--g50)}
::-webkit-scrollbar-thumb{background:var(--g300);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--g400)}

/* ══════ RESPONSIVE ══════ */
@media(max-width:768px){
  .header{padding:16px 14px 14px}
  .header h1{font-size:20px}
  .header .icon{font-size:30px}
  .toolbar{padding:10px 12px;gap:7px}
  .panel+.panel{border-left:none;border-top:1.5px solid var(--border2)}
  .main{flex-direction:column}
  .panel{flex:1 1 auto;min-height:200px}
  .statusbar{padding:8px 12px;gap:8px}
  .btn{padding:7px 12px;font-size:11.5px}
  .shortcut-hint{display:none}
}
@media(max-width:480px){
  .header{padding:14px 10px 12px}
  .header h1{font-size:17px}
  .header .icon{font-size:26px}
  .header p{font-size:11.5px}
  .toolbar{padding:8px 8px;gap:5px}
  .tool-grp label,.tool-chk span{font-size:11px}
  .tool-sel{padding:5px 7px;font-size:11.5px}
  .panel-head{padding:8px 10px}
  .panel-head h3{font-size:12.5px}
  #sqlInput,#sqlOutput{padding:10px;font-size:12px;line-height:1.65}
  .statusbar{padding:7px 8px}
  .stat{font-size:10.5px}
  .btn{padding:6px 10px;font-size:11px;gap:3px}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <span class="icon">🗃️</span>
    <h1>SQL Formatter & Beautifier</h1>
  </div>
  <p>Paste your SQL → Format, Highlight, Minify & Download</p>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="tool-grp">
    <label>📏 Indent:</label>
    <select class="tool-sel" id="indentSize">
      <option value="2">2 Spaces</option>
      <option value="4" selected>4 Spaces</option>
      <option value="tab">Tab</option>
    </select>
  </div>
  <div class="tool-grp">
    <label>🔤 Case:</label>
    <select class="tool-sel" id="keywordCase">
      <option value="upper" selected>UPPER</option>
      <option value="lower">lower</option>
      <option value="none">As-is</option>
    </select>
  </div>
  <div class="tool-grp">
    <label class="tool-chk">
      <input type="checkbox" id="syntaxHL" checked>
      <span>🎨 Highlight</span>
    </label>
  </div>
  <div class="tool-grp">
    <label class="tool-chk">
      <input type="checkbox" id="lineNums" checked>
      <span>🔢 Line #</span>
    </label>
  </div>
  <div class="spacer"></div>
  <button class="btn btn-sample" onclick="loadSample()">📄 Sample</button>
  <button class="btn btn-paste" onclick="pasteSQL()">📋 Paste</button>
  <button class="btn btn-format" onclick="formatSQL()">⚡ Format</button>
  <button class="btn btn-minify" onclick="minifySQL()">🗜️ Minify</button>
  <button class="btn btn-copy" onclick="copySQL()">📑 Copy</button>
  <button class="btn btn-download" onclick="downloadSQL()">⬇️ Save</button>
  <button class="btn btn-clear" onclick="clearAll()">🗑️ Clear</button>
</div>

<!-- MAIN PANELS -->
<div class="main">
  <!-- Input -->
  <div class="panel">
    <div class="panel-head">
      <h3>📝 Input SQL</h3>
      <span class="badge" id="inLen">0 chars</span>
    </div>
    <textarea id="sqlInput" spellcheck="false" placeholder="Paste or type your SQL query here...&#10;&#10;💡 Tip: Click '📄 Sample' to load example SQL&#10;⌨️ Press Ctrl + Enter to Format"></textarea>
  </div>
  <!-- Output -->
  <div class="panel">
    <div class="panel-head">
      <h3>✨ Formatted Output</h3>
      <span class="badge" id="outLen">0 chars</span>
    </div>
    <div class="output-wrap" id="outputWrap">
      <div class="line-nums" id="lineNums" style="display:none"></div>
      <pre id="sqlOutput"><span style="color:var(--g400)">Formatted SQL will appear here…</span></pre>
    </div>
  </div>
</div>

<!-- STATUSBAR -->
<div class="statusbar">
  <div class="stat"><span class="dot dot-g"></span> Ready</div>
  <div class="stat-sep"></div>
  <div class="stat" id="sKw"><span class="dot dot-b"></span> Keywords: 0</div>
  <div class="stat-sep"></div>
  <div class="stat" id="sLn"><span class="dot dot-b"></span> Lines: 0</div>
  <div class="stat-sep"></div>
  <div class="stat" id="sTm"><span class="dot dot-b"></span> Time: 0 ms</div>
  <div class="shortcut-hint">
    <kbd>Ctrl</kbd>+<kbd>Enter</kbd> Format &nbsp;|&nbsp; <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>C</kbd> Copy
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ================================================================
   SQL KEYWORDS / FUNCTIONS
   ================================================================ */
const KEYWORDS = new Set([
  'SELECT','FROM','WHERE','AND','OR','NOT','IN','ON','AS','JOIN',
  'LEFT','RIGHT','INNER','OUTER','FULL','CROSS','NATURAL',
  'INSERT','INTO','VALUES','UPDATE','SET','DELETE','DROP','CREATE',
  'TABLE','DATABASE','INDEX','VIEW','ALTER','ADD','COLUMN',
  'PRIMARY','KEY','FOREIGN','REFERENCES','CONSTRAINT','DEFAULT',
  'NULL','UNIQUE','CHECK','AUTO_INCREMENT',
  'ORDER','BY','GROUP','HAVING','LIMIT','OFFSET','DISTINCT',
  'UNION','ALL','INTERSECT','EXCEPT','EXISTS',
  'BETWEEN','LIKE','ILIKE','IS','CASE','WHEN','THEN','ELSE','END',
  'ASC','DESC','ANY','SOME','TOP','PERCENT','TRUNCATE',
  'GRANT','REVOKE','COMMIT','ROLLBACK','SAVEPOINT','TRANSACTION',
  'BEGIN','DECLARE','FETCH','CURSOR','OPEN','CLOSE',
  'IF','WHILE','FOR','LOOP','RETURN','EXEC','EXECUTE',
  'PROCEDURE','FUNCTION','TRIGGER','WITH','RECURSIVE','OVER',
  'PARTITION','ROWS','RANGE','UNBOUNDED','PRECEDING','FOLLOWING',
  'CURRENT','ROW','REPLACE','MERGE','USING','MATCHED',
  'EXPLAIN','ANALYZE','CASCADE','RESTRICT','TEMP','TEMPORARY',
  'ENABLE','DISABLE','RENAME','TO','SCHEMA','SEQUENCE',
  'LATERAL','PIVOT','UNPIVOT','APPLY','ROLLUP','CUBE',
  'FILTER','WITHIN','ARRAY','JSON','CAST','CONVERT',
  'COALESCE','NULLIF','RETURNING','WINDOW','TYPE','ENUM',
  'BOOLEAN','INT','INTEGER','BIGINT','SMALLINT','TINYINT',
  'FLOAT','DOUBLE','DECIMAL','NUMERIC','VARCHAR','CHAR',
  'TEXT','BLOB','DATE','TIME','DATETIME','TIMESTAMP','SERIAL',
  'TRUE','FALSE','INTERVAL','ZONE','NO','ACTION','OF','ONLY'
]);

const FUNCTIONS = new Set([
  'COUNT','SUM','AVG','MIN','MAX','ABS','CEIL','CEILING','FLOOR',
  'ROUND','POWER','SQRT','MOD','SIGN','RAND','RANDOM',
  'CONCAT','LENGTH','LEN','UPPER','LOWER','TRIM','LTRIM','RTRIM',
  'SUBSTRING','SUBSTR','REPLACE','REVERSE','REPEAT',
  'LPAD','RPAD','CHARINDEX','POSITION','INSTR','CHAR_LENGTH',
  'NOW','GETDATE','CURDATE','CURTIME','CURRENT_DATE','CURRENT_TIME',
  'CURRENT_TIMESTAMP','YEAR','MONTH','DAY','HOUR','MINUTE','SECOND',
  'DATEADD','DATEDIFF','DATE_FORMAT','TO_CHAR','TO_DATE','TO_NUMBER',
  'EXTRACT','EPOCH','IFNULL','ISNULL','NVL','NVL2','IIF','DECODE',
  'GREATEST','LEAST','ROW_NUMBER','RANK','DENSE_RANK','NTILE',
  'LAG','LEAD','FIRST_VALUE','LAST_VALUE','NTH_VALUE',
  'STRING_AGG','GROUP_CONCAT','ARRAY_AGG','JSON_AGG','JSON_OBJECT',
  'JSON_ARRAY','COALESCE','NULLIF','CAST','CONVERT'
]);

/* Major clause keywords – each should start a new line at indent 0 */
const CLAUSES = [
  'LEFT OUTER JOIN','RIGHT OUTER JOIN','FULL OUTER JOIN',
  'LEFT JOIN','RIGHT JOIN','INNER JOIN','OUTER JOIN','FULL JOIN',
  'CROSS JOIN','NATURAL JOIN',
  'INSERT INTO','DELETE FROM','CREATE TABLE','ALTER TABLE','DROP TABLE',
  'CREATE INDEX','DROP INDEX','CREATE VIEW','DROP VIEW',
  'ORDER BY','GROUP BY','PARTITION BY',
  'UNION ALL','UNION','INTERSECT','EXCEPT',
  'SELECT','FROM','WHERE','JOIN','SET','VALUES',
  'ON','AND','OR','HAVING','LIMIT','OFFSET',
  'CASE','WHEN','THEN','ELSE','END',
  'WITH','RETURNING','WINDOW','UPDATE'
].sort((a,b)=>b.length-a.length);

/* ================================================================
   ELEMENTS
   ================================================================ */
const $in   = document.getElementById('sqlInput');
const $out  = document.getElementById('sqlOutput');
const $lnN  = document.getElementById('lineNums');
const $wrap = document.getElementById('outputWrap');

$in.addEventListener('input',()=>{
  document.getElementById('inLen').textContent=$in.value.length+' chars';
});

/* ================================================================
   CORE FORMATTER
   ================================================================ */
function formatSQL(){
  const t0   = performance.now();
  const raw  = $in.value.trim();
  if(!raw){toast('⚠️ Please enter SQL first!','error');return}

  const indent = getIndent();
  const kcase  = document.getElementById('keywordCase').value;

  let formatted = beautify(raw,indent,kcase);

  /* Stats */
  const kwC  = countKW(formatted);
  const lnC  = formatted.split('\n').length;
  const ms   = (performance.now()-t0).toFixed(1);

  setStat(kwC,lnC,ms,formatted.length);
  renderOutput(formatted);
  toast('✅ SQL Formatted!','success');
}

function beautify(sql,indent,kcase){
  /* 1. Preserve strings & comments */
  const store=[];let si=0;
  sql=sql.replace(/'([^'\\]|\\.)*'/g,m=>{store.push(m);return`§§${si++}§§`});
  sql=sql.replace(/"([^"\\]|\\.)*"/g,m=>{store.push(m);return`§§${si++}§§`});
  sql=sql.replace(/`([^`]*)`/g,m=>{store.push(m);return`§§${si++}§§`});
  sql=sql.replace(/--.*$/gm,m=>{store.push(m);return`§§${si++}§§`});
  sql=sql.replace(/\/\*[\s\S]*?\*\//g,m=>{store.push(m);return`§§${si++}§§`});

  /* 2. Normalise whitespace */
  sql=sql.replace(/\s+/g,' ').trim();

  /* 3. Insert newlines before clauses */
  for(const cl of CLAUSES){
    const re=new RegExp(`\\b(${cl.replace(/ /g,'\\s+')})\\b`,'gi');
    sql=sql.replace(re,'\n$1');
  }

  /* 4. Semicolons → newline after */
  sql=sql.replace(/;/g,';\n');

  /* 5. Process lines */
  let lines=sql.split('\n').map(l=>l.trim()).filter(Boolean);
  let result=[], level=0, inSelect=false;

  for(let line of lines){
    const up=line.toUpperCase().replace(/\s+/g,' ').trim();

    /* Decrease indent for END */
    if(/^END\b/i.test(up)) level=Math.max(0,level-1);

    /* Track SELECT…FROM */
    if(/^SELECT\b/i.test(up)) inSelect=true;
    if(/^FROM\b/i.test(up))   inSelect=false;

    /* Determine current indent */
    let cur=level;
    if(/^(AND|OR)\b/i.test(up))              cur=level+1;
    if(/^(ON)\b/i.test(up))                  cur=level+1;
    if(/^(WHEN|THEN|ELSE)\b/i.test(up))      cur=level+1;

    /* Primary clauses stay at base level */
    if(/^(SELECT|FROM|WHERE|JOIN|LEFT|RIGHT|INNER|OUTER|FULL|CROSS|NATURAL|ORDER\s+BY|GROUP\s+BY|HAVING|LIMIT|OFFSET|UNION|INSERT|UPDATE|DELETE|SET|VALUES|CREATE|ALTER|DROP|WITH|RETURNING|WINDOW)\b/i.test(up)){
      cur=level;
    }

    /* Handle SELECT comma-split */
    if(/^SELECT\b/i.test(up)){
      const m=line.match(/^(SELECT\s+(?:DISTINCT\s+|TOP\s+\d+\s+)?)(.*)/i);
      if(m&&m[2].includes(',')){
        let kw=applyCase(m[1].trim(),kcase);
        const parts=splitComma(m[2]);
        result.push(indent.repeat(cur)+kw+' '+applyCase(parts[0].trim(),kcase));
        for(let i=1;i<parts.length;i++)
          result.push(indent.repeat(cur+1)+applyCase(parts[i].trim(),kcase));
      } else {
        result.push(indent.repeat(cur)+applyCase(line,kcase));
      }
    }
    else if(inSelect&&line.includes(',')){
      const parts=splitComma(line);
      for(const p of parts)
        result.push(indent.repeat(cur+1)+applyCase(p.trim(),kcase));
    }
    else{
      result.push(indent.repeat(cur)+applyCase(line,kcase));
    }

    /* Increase indent after CASE */
    if(/^CASE\b/i.test(up)) level++;
  }

  let out=result.join('\n');

  /* Restore preserved tokens */
  for(let i=store.length-1;i>=0;i--)
    out=out.replace(`§§${i}§§`,store[i]);

  return out.replace(/\n{3,}/g,'\n\n');
}

function splitComma(s){
  const r=[];let d=0,c='';
  for(const ch of s){
    if(ch==='(')d++;else if(ch===')')d--;
    if(ch===','&&d===0){r.push(c);c=''}else c+=ch;
  }
  if(c.trim())r.push(c);return r;
}

function applyCase(str,mode){
  if(mode==='none')return str;
  const all=[...KEYWORDS,...FUNCTIONS];
  all.sort((a,b)=>b.length-a.length);
  for(const kw of all){
    const re=new RegExp(`\\b(${kw.replace(/ /g,'\\s+')})\\b`,'gi');
    str=str.replace(re,m=>mode==='upper'?m.toUpperCase():m.toLowerCase());
  }
  return str;
}

/* ================================================================
   SYNTAX HIGHLIGHTING
   ================================================================ */
function highlight(sql){
  let h=sql.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  /* Comments */
  h=h.replace(/(--.*$)/gm,'<span class="sc">$1</span>');
  h=h.replace(/(\/\*[\s\S]*?\*\/)/g,'<span class="sc">$1</span>');
  /* Strings */
  h=h.replace(/('([^'\\]|\\.)*')/g,'<span class="ss">$1</span>');
  /* Back-tick identifiers */
  h=h.replace(/(`[^`]*`)/g,'<span class="sa">$1</span>');
  /* Numbers */
  h=h.replace(/\b(\d+\.?\d*)\b/g,'<span class="sn">$1</span>');
  /* Functions */
  const fnRe=new RegExp(`\\b(${[...FUNCTIONS].join('|')})\\s*(?=\\()`,'gi');
  h=h.replace(fnRe,'<span class="sf">$1</span>');
  /* Keywords */
  const kwArr=[...KEYWORDS].sort((a,b)=>b.length-a.length);
  for(const kw of kwArr){
    const re=new RegExp(`\\b(${kw})\\b`,'gi');
    h=h.replace(re,(m)=>{
      if(/<span/.test(m))return m;
      return `<span class="sk">${m}</span>`;
    });
  }
  /* Parentheses */
  h=h.replace(/([()])/g,'<span class="sp">$1</span>');
  /* Operators */
  h=h.replace(/(!=|&lt;&gt;|&gt;=|&lt;=|[=&lt;&gt;])/g,'<span class="so">$1</span>');
  /* Commas / semicolons */
  h=h.replace(/([,;])/g,'<span class="scm">$1</span>');
  return h;
}

/* ================================================================
   RENDER OUTPUT + LINE NUMBERS
   ================================================================ */
function renderOutput(text){
  const doHL=document.getElementById('syntaxHL').checked;
  const doLN=document.getElementById('lineNums').checked;

  $out.innerHTML=doHL?highlight(text):escHtml(text);

  if(doLN){
    const n=text.split('\n').length;
    let nums='';for(let i=1;i<=n;i++)nums+=i+'\n';
    $lnN.textContent=nums;
    $lnN.style.display='block';
    $out.style.paddingLeft=(String(n).length*9+26)+'px';
  }else{
    $lnN.style.display='none';
    $out.style.paddingLeft='16px';
  }
  document.getElementById('outLen').textContent=text.length+' chars';
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

/* ================================================================
   MINIFY
   ================================================================ */
function minifySQL(){
  const raw=$in.value.trim();
  if(!raw){toast('⚠️ Please enter SQL first!','error');return}
  let m=raw
    .replace(/--.*$/gm,'')
    .replace(/\/\*[\s\S]*?\*\//g,'')
    .replace(/\s+/g,' ')
    .replace(/\s*([,()=<>!;])\s*/g,'$1')
    .trim();
  renderOutput(m);
  setStat(countKW(m),1,'0',m.length);
  toast('🗜️ SQL Minified!','info');
}

/* ================================================================
   COPY / PASTE / CLEAR / DOWNLOAD / SAMPLE
   ================================================================ */
function copySQL(){
  const t=$out.textContent||$out.innerText;
  if(!t||t.includes('will appear')){toast('⚠️ Nothing to copy!','error');return}
  navigator.clipboard.writeText(t).then(()=>toast('📋 Copied!','success'))
  .catch(()=>{fallbackCopy(t);toast('📋 Copied!','success')});
}
function fallbackCopy(t){const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a)}

function pasteSQL(){
  navigator.clipboard.readText().then(t=>{
    $in.value=t;
    document.getElementById('inLen').textContent=t.length+' chars';
    toast('📋 Pasted!','info');
  }).catch(()=>toast('⚠️ Clipboard access denied','error'));
}

function clearAll(){
  $in.value='';
  $out.innerHTML='<span style="color:var(--g400)">Formatted SQL will appear here…</span>';
  $lnN.textContent='';$lnN.style.display='none';$out.style.paddingLeft='16px';
  document.getElementById('inLen').textContent='0 chars';
  document.getElementById('outLen').textContent='0 chars';
  setStat(0,0,0,0);
  toast('🗑️ Cleared!','info');
}

function downloadSQL(){
  const t=$out.textContent||$out.innerText;
  if(!t||t.includes('will appear')){toast('⚠️ Nothing to download!','error');return}
  const blob=new Blob([t],{type:'text/sql'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='formatted_query.sql';a.click();
  URL.revokeObjectURL(a.href);
  toast('⬇️ Downloaded!','success');
}

function loadSample(){
  const s=`-- Get top customers with their order stats
SELECT
  c.customer_id, c.first_name, c.last_name, c.email,
  COUNT(o.order_id) AS total_orders,
  SUM(o.amount) AS total_spent,
  AVG(o.amount) AS avg_order_value,
  MAX(o.order_date) AS last_order_date
FROM customers c
INNER JOIN orders o ON c.customer_id = o.customer_id
LEFT JOIN order_items oi ON o.order_id = oi.order_id
WHERE c.status = 'active'
  AND o.order_date >= '2024-01-01'
  AND o.amount > 50
GROUP BY c.customer_id, c.first_name, c.last_name, c.email
HAVING COUNT(o.order_id) >= 3
ORDER BY total_spent DESC
LIMIT 25 OFFSET 0;

-- Update customer tier based on spending
UPDATE customers
SET tier = CASE
  WHEN total_spent > 10000 THEN 'platinum'
  WHEN total_spent > 5000 THEN 'gold'
  WHEN total_spent > 1000 THEN 'silver'
  ELSE 'bronze'
END
WHERE status = 'active';`;
  $in.value=s;
  document.getElementById('inLen').textContent=s.length+' chars';
  toast('📄 Sample SQL Loaded!','success');
}

/* ================================================================
   HELPERS
   ================================================================ */
function getIndent(){const v=document.getElementById('indentSize').value;return v==='tab'?'\t':' '.repeat(+v)}
function countKW(s){let c=0;const u=s.toUpperCase();for(const k of KEYWORDS){const r=new RegExp(`\\b${k}\\b`,'g');const m=u.match(r);if(m)c+=m.length}return c}
function setStat(kw,ln,ms,len){
  document.getElementById('sKw').innerHTML=`<span class="dot dot-b"></span> Keywords: ${kw}`;
  document.getElementById('sLn').innerHTML=`<span class="dot dot-b"></span> Lines: ${ln}`;
  document.getElementById('sTm').innerHTML=`<span class="dot dot-b"></span> Time: ${ms} ms`;
}

function toast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast toast-'+type+' show';
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500);
}

/* ================================================================
   KEYBOARD SHORTCUTS
   ================================================================ */
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){formatSQL();e.preventDefault()}
  if((e.ctrlKey||e.metaKey)&&e.shiftKey&&(e.key==='C'||e.key==='c')){copySQL();e.preventDefault()}
});

/* Tab in textarea */
$in.addEventListener('keydown',e=>{
  if(e.key==='Tab'){
    e.preventDefault();
    const s=$in.selectionStart,en=$in.selectionEnd;
    $in.value=$in.value.substring(0,s)+'  '+$in.value.substring(en);
    $in.selectionStart=$in.selectionEnd=s+2;
  }
});

/* Sync scroll for line numbers */
$wrap.addEventListener('scroll',()=>{
  $lnN.style.top=-$wrap.scrollTop+'px';
});
</script>
