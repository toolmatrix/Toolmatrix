<script>
  (function(){
    // ----- 9-DOT TOOLS (exclude current) -----
    const toolsList = [
      { name: 'Favicon Generator', url: 'https://toolmatrix.space/tools/web/favicon-generator.html', icon: 'fa-star' },
      { name: 'HTML/CSS/JS Minifier', url: 'https://toolmatrix.space/tools/web/minifier.html', icon: 'fa-code' },
      { name: 'JSON Formatter', url: 'https://toolmatrix.space/tools/web/json-formatter.html', icon: 'fa-brackets-curly' },
      { name: 'Base64 Encoder', url: 'https://toolmatrix.space/tools/web/base64.html', icon: 'fa-lock' },
      { name: 'Regex Tester', url: 'https://toolmatrix.space/tools/web/regex-tester.html', icon: 'fa-regular fa-regex' },
      { name: 'SQL Formatter', url: 'https://toolmatrix.space/tools/web/sql-formatter.html', icon: 'fa-database' },
      { name: 'CSS Formatter', url: 'https://toolmatrix.space/tools/web/css-formatter.html', icon: 'fa-paint-brush' },
      { name: 'Color Picker', url: 'https://toolmatrix.space/tools/web/color-picker.html', icon: 'fa-palette' },
      { name: 'URL Encoder/Decoder', url: 'https://toolmatrix.space/tools/web/url-encoder.html', icon: 'fa-link' }
    ];
    const panel = document.getElementById('toolsPanel');
    toolsList.forEach(t => {
      const a = document.createElement('a'); a.href = t.url; a.target = '_self'; a.className = 'tool-link';
      a.innerHTML = `<i class="fas ${t.icon}"></i> ${t.name}`; panel.appendChild(a);
    });
    const toolsBtn = document.getElementById('nineDotsBtn'), toolsPanel = document.getElementById('toolsPanel');
    toolsBtn.addEventListener('click', e => { e.stopPropagation(); toolsPanel.classList.toggle('show'); });
    document.addEventListener('click', e => { if(!toolsBtn.contains(e.target) && !toolsPanel.contains(e.target)) toolsPanel.classList.remove('show'); });

    // ----- DOM elements -----
    const urlInput = document.getElementById('urlInput');
    const methodSelect = document.getElementById('methodSelect');
    const timeoutInput = document.getElementById('timeoutInput');
    const redirectSelect = document.getElementById('redirectSelect');
    const useProxyCheck = document.getElementById('useProxyCheck');
    const headersInput = document.getElementById('headersInput');
    const resultsPanel = document.getElementById('resultsPanel');
    const loadingDiv = document.getElementById('loadingIndicator');
    const errorMsg = document.getElementById('errorMessage');
    const statusBadge = document.getElementById('statusBadge');
    const responseTimeSpan = document.getElementById('responseTime');
    const redirectCountSpan = document.getElementById('redirectCount');
    const headersPane = document.getElementById('headersPane');
    const redirectsPane = document.getElementById('redirectsPane');
    const bodyPane = document.getElementById('bodyPane');

    let currentResult = null;

    // Helper: proxy URL
    function getProxyUrl(url) {
      return `https://corsproxy.io/?${encodeURIComponent(url)}`;
    }

    // Check status
    window.checkStatus = async function() {
      let url = urlInput.value.trim();
      if (!url) { showToast('Please enter a URL', 'error'); return; }
      if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;

      const method = methodSelect.value;
      const timeout = parseInt(timeoutInput.value) || 10000;
      const redirect = redirectSelect.value;
      const useProxy = useProxyCheck.checked;

      let customHeaders = {};
      try { customHeaders = JSON.parse(headersInput.value || '{}'); } catch(e) { showToast('Invalid JSON headers', 'error'); return; }

      // Prepare fetch options
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeout);

      const fetchOptions = {
        method: method,
        headers: { ...customHeaders },
        signal: controller.signal,
        redirect: redirect // 'follow', 'manual', 'error'
      };

      let targetUrl = url;
      if (useProxy) targetUrl = getProxyUrl(url);

      // UI loading
      resultsPanel.style.display = 'none';
      errorMsg.textContent = '';
      loadingDiv.style.display = 'block';

      const startTime = performance.now();
      let response, error = null, redirectChain = [];

      try {
        if (redirect === 'manual') {
          // Manual redirect handling
          let currentUrl = targetUrl;
          let redirectCount = 0;
          const maxRedirects = 10;
          while (redirectCount < maxRedirects) {
            const res = await fetch(currentUrl, { ...fetchOptions, redirect: 'manual' });
            const status = res.status;
            const location = res.headers.get('location');
            redirectChain.push({ url: currentUrl, status, location });
            if (status >= 300 && status < 400 && location) {
              currentUrl = new URL(location, currentUrl).href;
              if (useProxy && !currentUrl.includes('corsproxy.io')) currentUrl = getProxyUrl(currentUrl);
              redirectCount++;
            } else {
              response = res;
              break;
            }
          }
          if (!response) throw new Error('Too many redirects');
        } else {
          response = await fetch(targetUrl, fetchOptions);
          // If redirect followed automatically, we may not have chain; we can try to extract from response
          if (response.redirected) {
            redirectChain.push({ url: targetUrl, status: response.status, location: response.url });
          }
        }
      } catch (e) {
        error = e;
      } finally {
        clearTimeout(timeoutId);
        loadingDiv.style.display = 'none';
      }

      const endTime = performance.now();
      const duration = Math.round(endTime - startTime);

      if (error) {
        errorMsg.textContent = `❌ Error: ${error.message}`;
        resultsPanel.style.display = 'none';
        return;
      }

      // Process response
      const status = response.status;
      const statusText = response.statusText;
      const headers = {};
      response.headers.forEach((val, key) => headers[key] = val);

      // Determine badge class
      let badgeClass = '';
      if (status >= 200 && status < 300) badgeClass = 'success';
      else if (status >= 300 && status < 400) badgeClass = 'redirect';
      else if (status >= 400) badgeClass = 'error';
      statusBadge.className = `status-badge ${badgeClass}`;
      statusBadge.textContent = `${status} ${statusText}`;

      responseTimeSpan.innerHTML = `<i class="far fa-clock"></i> ${duration}ms`;
      const redirects = redirectChain.length || (response.redirected ? 1 : 0);
      redirectCountSpan.innerHTML = `<i class="fas fa-redo-alt"></i> ${redirects} redirect${redirects!==1?'s':''}`;

      // Render headers
      let headersHtml = '<table class="headers-table"><tr><th>Header</th><th>Value</th></tr>';
      for (const [k,v] of Object.entries(headers)) {
        headersHtml += `<tr><td>${escapeHtml(k)}</td><td>${escapeHtml(v)}</td></tr>`;
      }
      headersHtml += '</table>';
      headersPane.innerHTML = headersHtml;

      // Render redirects
      if (redirectChain.length > 0) {
        let redirHtml = '<ul class="redirect-chain">';
        redirectChain.forEach((r, i) => {
          redirHtml += `<li><span class="url">${escapeHtml(r.url)}</span> <span class="code">${r.status}</span> → ${escapeHtml(r.location || '')}</li>`;
        });
        redirHtml += '</ul>';
        redirectsPane.innerHTML = redirHtml;
      } else {
        redirectsPane.innerHTML = '<p>No redirects (or followed automatically).</p>';
      }

      // Render body (preview)
      try {
        const clone = response.clone();
        const text = await clone.text();
        const truncated = text.length > 5000 ? text.substring(0,5000) + '… (truncated)' : text;
        bodyPane.innerHTML = `<pre>${escapeHtml(truncated)}</pre>`;
      } catch(e) {
        bodyPane.innerHTML = '<p>Could not read response body.</p>';
      }

      currentResult = { status, headers, redirectChain, body: '' };
      resultsPanel.style.display = 'block';
    };

    window.switchTab = function(tabName) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      if (tabName === 'headers') {
        document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
        headersPane.classList.add('active');
      } else if (tabName === 'redirects') {
        document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
        redirectsPane.classList.add('active');
      } else {
        document.querySelector('.tab-btn:nth-child(3)').classList.add('active');
        bodyPane.classList.add('active');
      }
    };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showToast(msg, type='info') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.style.background = type==='error'?'rgba(220,38,38,.92)':'rgba(22,163,74,.92)';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // Initialize with sample check on page load? (optional)
    window.addEventListener('load', () => {
      // Prefill a working example
    });
  })();
</script>
</body>
</html>
