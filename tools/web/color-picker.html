    // Conversion functions
    function rgbToHex(r,g,b) {
      return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
    }
    function rgbToHsl(r,g,b) {
      r /= 255; g /= 255; b /= 255;
      const max = Math.max(r,g,b), min = Math.min(r,g,b);
      let h,s,l = (max+min)/2;
      if(max === min) h = s = 0;
      else {
        const d = max-min;
        s = l > 0.5 ? d/(2-max-min) : d/(max+min);
        switch(max){
          case r: h = (g-b)/d + (g<b?6:0); break;
          case g: h = (b-r)/d + 2; break;
          case b: h = (r-g)/d + 4; break;
        }
        h *= 60;
      }
      return { h: Math.round(h), s: Math.round(s*100), l: Math.round(l*100) };
    }
    function rgbToCmyk(r,g,b) {
      let c=1-(r/255), m=1-(g/255), y=1-(b/255);
      let k = Math.min(c,m,y);
      if(k===1) return {c:0,m:0,y:0,k:100};
      c = Math.round(((c-k)/(1-k))*100);
      m = Math.round(((m-k)/(1-k))*100);
      y = Math.round(((y-k)/(1-k))*100);
      k = Math.round(k*100);
      return {c,m,y,k};
    }
    function hslToRgb(h,s,l) {
      s/=100; l/=100;
      const c = (1 - Math.abs(2*l-1)) * s;
      const x = c * (1 - Math.abs((h/60)%2 -1));
      const m = l - c/2;
      let r,g,b;
      if(h<60) {r=c;g=x;b=0;}
      else if(h<120) {r=x;g=c;b=0;}
      else if(h<180) {r=0;g=c;b=x;}
      else if(h<240) {r=0;g=x;b=c;}
      else if(h<300) {r=x;g=0;b=c;}
      else {r=c;g=0;b=x;}
      return {
        r: Math.round((r+m)*255),
        g: Math.round((g+m)*255),
        b: Math.round((b+m)*255)
      };
    }
    function cmykToRgb(c,m,y,k) {
      c/=100; m/=100; y/=100; k/=100;
      const r = 255 * (1-c) * (1-k);
      const g = 255 * (1-m) * (1-k);
      const b = 255 * (1-y) * (1-k);
      return { r: Math.round(r), g: Math.round(g), b: Math.round(b) };
    }

    // Update all UI from RGB
    function updateFromRgb(r,g,b) {
      currentR = r; currentG = g; currentB = b;
      // Preview & native
      const hex = rgbToHex(r,g,b);
      preview.style.backgroundColor = hex;
      nativePicker.value = hex;
      
      // Update text inputs
      hexInput.value = hex;
      rgbInput.value = `rgb(${r}, ${g}, ${b})`;
      const hsl = rgbToHsl(r,g,b);
      hslInput.value = `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
      const cmyk = rgbToCmyk(r,g,b);
      cmykInput.value = `cmyk(${cmyk.c}%, ${cmyk.m}%, ${cmyk.y}%, ${cmyk.k}%)`;
      
      // Sliders
      rSlider.value = r; rVal.textContent = r;
      gSlider.value = g; gVal.textContent = g;
      bSlider.value = b; bVal.textContent = b;
      
      // CMYK fields
      cInput.value = cmyk.c; mInput.value = cmyk.m; yInput.value = cmyk.y; kInput.value = cmyk.k;
    }

    // Event listeners
    nativePicker.addEventListener('input', (e) => {
      const hex = e.target.value;
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      updateFromRgb(r,g,b);
    });

    // Sliders
    rSlider.addEventListener('input', () => { updateFromRgb(parseInt(rSlider.value), currentG, currentB); });
    gSlider.addEventListener('input', () => { updateFromRgb(currentR, parseInt(gSlider.value), currentB); });
    bSlider.addEventListener('input', () => { updateFromRgb(currentR, currentG, parseInt(bSlider.value)); });

    // CMYK inputs
    function updateFromCmyk() {
      const c = parseFloat(cInput.value)||0, m = parseFloat(mInput.value)||0;
      const y = parseFloat(yInput.value)||0, k = parseFloat(kInput.value)||0;
      const rgb = cmykToRgb(c,m,y,k);
      updateFromRgb(rgb.r, rgb.g, rgb.b);
    }
    cInput.addEventListener('input', updateFromCmyk);
    mInput.addEventListener('input', updateFromCmyk);
    yInput.addEventListener('input', updateFromCmyk);
    kInput.addEventListener('input', updateFromCmyk);

    // Manual text input parsing (simple)
    hexInput.addEventListener('change', () => {
      let val = hexInput.value.trim();
      if(val.startsWith('#')) val = val.slice(1);
      if(val.length===3) val = val.split('').map(c=>c+c).join('');
      if(val.length===6) {
        const r = parseInt(val.slice(0,2),16);
        const g = parseInt(val.slice(2,4),16);
        const b = parseInt(val.slice(4,6),16);
        if(!isNaN(r)&&!isNaN(g)&&!isNaN(b)) updateFromRgb(r,g,b);
      }
    });
    rgbInput.addEventListener('change', () => {
      const match = rgbInput.value.match(/(\d+)[^\d]+(\d+)[^\d]+(\d+)/);
      if(match) updateFromRgb(parseInt(match[1]), parseInt(match[2]), parseInt(match[3]));
    });
    hslInput.addEventListener('change', () => {
      const match = hslInput.value.match(/(\d+)[^\d]+(\d+)[^\d]+(\d+)/);
      if(match) {
        const h = parseInt(match[1]), s = parseInt(match[2]), l = parseInt(match[3]);
        const rgb = hslToRgb(h,s,l);
        updateFromRgb(rgb.r, rgb.g, rgb.b);
      }
    });

    // Quick palette
    const paletteColors = ['#22c55e','#ef4444','#3b82f6','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#84cc16'];
    const paletteDiv = document.getElementById('palette');
    paletteColors.forEach(col => {
      const sw = document.createElement('div');
      sw.className = 'swatch';
      sw.style.backgroundColor = col;
      sw.addEventListener('click', () => {
        const r = parseInt(col.slice(1,3),16), g = parseInt(col.slice(3,5),16), b = parseInt(col.slice(5,7),16);
        updateFromRgb(r,g,b);
      });
      paletteDiv.appendChild(sw);
    });

    // Copy function
    window.copyFormat = function(type) {
      let text = '';
      if(type==='hex') text = hexInput.value;
      else if(type==='rgb') text = rgbInput.value;
      else if(type==='hsl') text = hslInput.value;
      else if(type==='cmyk') text = cmykInput.value;
      navigator.clipboard.writeText(text).then(() => {
        showToast(`✅ ${type.toUpperCase()} copied!`);
      }).catch(() => showToast('⚠️ Copy failed'));
    };

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    // Initialize
    updateFromRgb(34,197,94);
  })();
</script>
</body>
</html>
