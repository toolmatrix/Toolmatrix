<div class="toast" id="toast"></div>

<script>
  (function(){
    // ----- 9-DOT TOOLS (exclude current) -----
    const toolsList = [
      { name: 'Favicon Generator', url: 'https://toolmatrix.space/tools/web/favicon-generator.html', icon: 'fa-star' },
      { name: 'HTML/CSS/JS Minifier', url: 'https://toolmatrix.space/tools/web/minifier.html', icon: 'fa-code' },
      { name: 'JSON Formatter', url: 'https://toolmatrix.space/tools/web/json-formatter.html', icon: 'fa-brackets-curly' },
      { name: 'Base64 Encoder', url: 'https://toolmatrix.space/tools/web/base64.html', icon: 'fa-lock' },
      { name: 'Regex Tester', url: 'https://toolmatrix.space/tools/web/regex-tester.html', icon: 'fa-regular fa-regex' },
      { name: 'SQL Formatter', url: 'https://toolmatrix.space/tools/web/sql-formatter.html', icon: 'fa-database' },
      { name: 'CSS Formatter', url: 'https://toolmatrix.space/tools/web/css-formatter.html', icon: 'fa-paint-brush' },
      { name: 'Color Picker', url: 'https://toolmatrix.space/tools/web/color-picker.html', icon: 'fa-palette' },
      { name: 'HTTP Status Checker', url: 'https://toolmatrix.space/tools/web/http-status-checker.html', icon: 'fa-server' }
    ];
    const panel = document.getElementById('toolsPanel');
    toolsList.forEach(t => {
      const a = document.createElement('a'); a.href = t.url; a.target = '_self'; a.className = 'tool-link';
      a.innerHTML = `<i class="fas ${t.icon}"></i> ${t.name}`; panel.appendChild(a);
    });
    const toolsBtn = document.getElementById('nineDotsBtn'), toolsPanel = document.getElementById('toolsPanel');
    toolsBtn.addEventListener('click', e => { e.stopPropagation(); toolsPanel.classList.toggle('show'); });
    document.addEventListener('click', e => { if(!toolsBtn.contains(e.target) && !toolsPanel.contains(e.target)) toolsPanel.classList.remove('show'); });

    // ----- App state -----
    let currentMode = 'encode'; // 'encode' or 'decode'
    const inputArea = document.getElementById('inputArea');
    const outputArea = document.getElementById('outputArea');
    const inLen = document.getElementById('inLen');
    const outLen = document.getElementById('outLen');
    const modeStat = document.getElementById('modeStat');
    const diffStat = document.getElementById('diffStat');

    // UI elements
    const encodeMethod = document.getElementById('encodeMethod');
    const spaceHandling = document.getElementById('spaceHandling');
    const liveCheck = document.getElementById('liveConvert');

    // Update char counts
    inputArea.addEventListener('input', () => {
      inLen.textContent = inputArea.value.length + ' chars';
      if (liveCheck.checked) convert();
    });

    // Set mode
    window.setMode = function(mode) {
      currentMode = mode;
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
      modeStat.textContent = mode === 'encode' ? 'Encode' : 'Decode';
      if (liveCheck.checked) convert();
    };

    // Conversion logic
    function performEncode(text) {
      let result;
      const method = encodeMethod.value;
      if (method === 'component') {
        result = encodeURIComponent(text);
      } else {
        result = encodeURI(text);
      }
      // Space handling
      if (spaceHandling.value === 'plus') {
        result = result.replace(/%20/g, '+');
      }
      return result;
    }

    function performDecode(text) {
      try {
        // Replace + with space if needed
        let str = text.replace(/\+/g, ' ');
        return decodeURIComponent(str);
      } catch (e) {
        return '⚠️ Invalid encoded string';
      }
    }

    window.convert = function() {
      const input = inputArea.value;
      if (!input) { outputArea.textContent = ''; outLen.textContent = '0 chars'; diffStat.textContent = '—'; return; }
      
      let output;
      if (currentMode === 'encode') {
        output = performEncode(input);
      } else {
        output = performDecode(input);
      }
      
      outputArea.textContent = output;
      outLen.textContent = output.length + ' chars';
      
      // Diff stat
      const inSize = new Blob([input]).size;
      const outSize = new Blob([output]).size;
      const change = outSize - inSize;
      diffStat.innerHTML = `${change > 0 ? '+' : ''}${change} bytes (${((outSize/inSize)*100).toFixed(0)}%)`;
    };

    // Sample
    window.loadSample = function() {
      if (currentMode === 'encode') {
        inputArea.value = 'https://example.com/search?q=hello world&name=John Doe&city=New York';
      } else {
        inputArea.value = 'https%3A%2F%2Fexample.com%2Fsearch%3Fq%3Dhello%20world%26name%3DJohn%20Doe%26city%3DNew%20York';
      }
      inLen.textContent = inputArea.value.length + ' chars';
      convert();
      showToast('📄 Sample loaded');
    };

    // Copy
    window.copyOutput = function() {
      const text = outputArea.textContent;
      if (!text) { showToast('⚠️ Nothing to copy'); return; }
      navigator.clipboard.writeText(text).then(() => showToast('📋 Copied!')).catch(() => showToast('❌ Copy failed'));
    };

    // Clear
    window.clearAll = function() {
      inputArea.value = ''; outputArea.textContent = '';
      inLen.textContent = '0 chars'; outLen.textContent = '0 chars'; diffStat.textContent = '—';
      showToast('🗑️ Cleared');
    };

    // Toast
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    // Listen to option changes if live
    encodeMethod.addEventListener('change', () => { if (liveCheck.checked) convert(); });
    spaceHandling.addEventListener('change', () => { if (liveCheck.checked) convert(); });
    liveCheck.addEventListener('change', () => { if (liveCheck.checked) convert(); });

    // Initialize
    setMode('encode');
    inputArea.value = '';
    outputArea.textContent = '';
  })();
</script>
