<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Currency Converter – ToolMatrix</title>
<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#f0f4f3;
    color:#1e293b;
}
.container{
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}
.card{
    background:#ffffff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.1);
    border-top:4px solid #8bc34a;
}
h1{
    text-align:center;
    margin-bottom:5px;
    font-size:36px;
    color:#2d5720;
}
.tagline{
    text-align:center;
    margin-bottom:30px;
    font-size:18px;
    color:#5a6b5a;
    font-weight:500;
}
.row{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    gap:15px;
    align-items:end;
}
input,select{
    width:100%;
    padding:14px;
    border-radius:8px;
    border:2px solid #e2e8f0;
    font-size:18px;
    background:#f8fafc;
    transition:border 0.2s;
}
input:focus,select:focus{
    outline:none;
    border-color:#8bc34a;
    box-shadow:0 0 0 3px rgba(139,195,74,0.2);
}
button{
    padding:14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    font-size:18px;
    background:#8bc34a;
    color:#fff;
    transition:background 0.2s, transform 0.1s;
}
button:hover{
    background:#7cb342;
    transform:scale(1.02);
}
.result{
    margin-top:25px;
    text-align:center;
    font-size:32px;
    font-weight:bold;
    color:#2d5720;
}
.rate{
    margin-top:10px;
    text-align:center;
    font-size:18px;
    color:#5a6b5a;
}
.live-box{
    margin-top:40px;
    background:#f1f8e9;
    padding:20px;
    border-radius:12px;
}
.live-box h2{
    font-size:24px;
    margin-bottom:15px;
    color:#2d5720;
    border-left:5px solid #8bc34a;
    padding-left:10px;
}
.live-item{
    font-size:18px;
    padding:8px 0;
    border-bottom:1px dashed #c5e1a5;
}
.live-item:last-child{
    border-bottom:none;
}
@media(max-width:768px){
    .row{
        grid-template-columns:1fr;
    }
    button{
        width:100%;
    }
}
</style>
</head>
<body>

<div class="container">
<div class="card">

<h1>Currency Converter</h1>
<div class="tagline">⚡ Real-time exchange rates for 16+ major currencies • Fast, accurate & free</div>

<div class="row">
<div>
<input type="number" id="amount" value="1" step="any">
<select id="fromCurrency">
<option value="USD" selected>USD - US Dollar</option>
<option value="PKR">PKR - Pakistani Rupee</option>
<option value="EUR">EUR - Euro</option>
<option value="GBP">GBP - British Pound</option>
<option value="AED">AED - UAE Dirham</option>
<option value="INR">INR - Indian Rupee</option>
<option value="CAD">CAD - Canadian Dollar</option>
<option value="AUD">AUD - Australian Dollar</option>
<option value="JPY">JPY - Japanese Yen</option>
<option value="CNY">CNY - Chinese Yuan</option>
<option value="SAR">SAR - Saudi Riyal</option>
<option value="CHF">CHF - Swiss Franc</option>
<option value="NZD">NZD - New Zealand Dollar</option>
<option value="TRY">TRY - Turkish Lira</option>
<option value="ZAR">ZAR - South African Rand</option>
<option value="BRL">BRL - Brazilian Real</option>
<option value="RUB">RUB - Russian Ruble</option>
<option value="MXN">MXN - Mexican Peso</option>
</select>
</div>

<button onclick="swapCurrencies()">⇄</button>

<div>
<select id="toCurrency">
<option value="PKR" selected>PKR - Pakistani Rupee</option>
<option value="USD">USD - US Dollar</option>
<option value="EUR">EUR - Euro</option>
<option value="GBP">GBP - British Pound</option>
<option value="AED">AED - UAE Dirham</option>
<option value="INR">INR - Indian Rupee</option>
<option value="CAD">CAD - Canadian Dollar</option>
<option value="AUD">AUD - Australian Dollar</option>
<option value="JPY">JPY - Japanese Yen</option>
<option value="CNY">CNY - Chinese Yuan</option>
<option value="SAR">SAR - Saudi Riyal</option>
<option value="CHF">CHF - Swiss Franc</option>
<option value="NZD">NZD - New Zealand Dollar</option>
<option value="TRY">TRY - Turkish Lira</option>
<option value="ZAR">ZAR - South African Rand</option>
<option value="BRL">BRL - Brazilian Real</option>
<option value="RUB">RUB - Russian Ruble</option>
<option value="MXN">MXN - Mexican Peso</option>
</select>
</div>
</div>

<div class="result" id="result">Loading...</div>
<div class="rate" id="rateInfo"></div>

<div class="live-box">
<h2>📊 Top 10 Live Rates (Base USD)</h2>
<div class="live-item" id="usd_pkr"></div>
<div class="live-item" id="usd_eur"></div>
<div class="live-item" id="usd_gbp"></div>
<div class="live-item" id="usd_aed"></div>
<div class="live-item" id="usd_inr"></div>
<div class="live-item" id="usd_cad"></div>
<div class="live-item" id="usd_aud"></div>
<div class="live-item" id="usd_jpy"></div>
<div class="live-item" id="usd_cny"></div>
<div class="live-item" id="usd_sar"></div>
</div>

<script async="async" data-cfasync="false" src="https://logshandgripquarterback.com/521557a0097cb796fb53391d503caea3/invoke.js"></script>
<div id="container-521557a0097cb796fb53391d503caea3"></div>

<script>
  atOptions = {
    'key' : 'f2bd4040afafe750e7a3e138c826e72c',
    'format' : 'iframe',
    'height' : 250,
    'width' : 300,
    'params' : {}
  };
</script>
<script src="https://logshandgripquarterback.com/f2bd4040afafe750e7a3e138c826e72c/invoke.js"></script>

<script src="https://logshandgripquarterback.com/2f/8e/73/2f8e73ae0d35ba6e793c280b73571187.js"></script>
</div>
</div>

<script>
const amountInput = document.getElementById("amount");
const fromSelect = document.getElementById("fromCurrency");
const toSelect = document.getElementById("toCurrency");

async function convert(){
    let amount=amountInput.value;
    let from=fromSelect.value;
    let to=toSelect.value;

    const response = await fetch(`https://api.exchangerate-api.com/v4/latest/${from}`);
    const data = await response.json();

    const rate = data.rates[to];
    const result = (amount * rate).toFixed(2);

    document.getElementById("result").innerText =
        `${amount} ${from} = ${result} ${to}`;

    document.getElementById("rateInfo").innerText =
        `1 ${from} = ${rate} ${to}`;
}

function swapCurrencies(){
    let temp=fromSelect.value;
    fromSelect.value=toSelect.value;
    toSelect.value=temp;
    convert();
}

async function loadTopRates(){
    const response = await fetch(`https://api.exchangerate-api.com/v4/latest/USD`);
    const data = await response.json();

    document.getElementById("usd_pkr").innerText = `USD → PKR: ${data.rates.PKR}`;
    document.getElementById("usd_eur").innerText = `USD → EUR: ${data.rates.EUR}`;
    document.getElementById("usd_gbp").innerText = `USD → GBP: ${data.rates.GBP}`;
    document.getElementById("usd_aed").innerText = `USD → AED: ${data.rates.AED}`;
    document.getElementById("usd_inr").innerText = `USD → INR: ${data.rates.INR}`;
    document.getElementById("usd_cad").innerText = `USD → CAD: ${data.rates.CAD}`;
    document.getElementById("usd_aud").innerText = `USD → AUD: ${data.rates.AUD}`;
    document.getElementById("usd_jpy").innerText = `USD → JPY: ${data.rates.JPY}`;
    document.getElementById("usd_cny").innerText = `USD → CNY: ${data.rates.CNY}`;
    document.getElementById("usd_sar").innerText = `USD → SAR: ${data.rates.SAR}`;
}

amountInput.addEventListener("input",convert);
fromSelect.addEventListener("change",convert);
toSelect.addEventListener("change",convert);

convert();
loadTopRates();
</script>

</body>
</html>
