<!DOCTYPE html>
<html lang="en">
<head>
     <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Professional Text to Speech Converter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            display: flex;
            flex-direction: column;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: white;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .header {
            background: linear-gradient(135deg, #66bb6a 0%, #4caf50 100%);
            color: white;
            padding: 20px;
            text-align: center;
            flex-shrink: 0;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: clamp(20px, 5vw, 36px);
            margin-bottom: 8px;
            font-weight: 700;
        }

        .header p {
            font-size: clamp(12px, 3vw, 18px);
            opacity: 0.95;
        }

        .main-content {
            flex: 1;
            padding: clamp(15px, 3vw, 30px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #f1f8e9;
        }

        .section {
            background: white;
            padding: clamp(15px, 3vw, 25px);
            border-radius: 12px;
            border: 2px solid #a5d6a7;
            box-shadow: 0 2px 8px rgba(76, 175, 80, 0.1);
        }

        .section-title {
            color: #2e7d32;
            font-size: clamp(16px, 4vw, 22px);
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .label {
            display: block;
            color: #2e7d32;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: clamp(13px, 3vw, 16px);
        }

        textarea {
            width: 100%;
            min-height: clamp(150px, 30vh, 250px);
            padding: 15px;
            border: 3px solid #81c784;
            border-radius: 10px;
            font-size: clamp(14px, 3vw, 16px);
            font-family: inherit;
            resize: none;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        textarea:focus {
            outline: none;
            border-color: #4caf50;
            box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.1);
            background: white;
        }

        .char-counter {
            text-align: right;
            color: #66bb6a;
            font-size: clamp(12px, 2.5vw, 14px);
            margin-top: 6px;
            font-weight: 600;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 768px) {
            .controls-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .controls-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        select {
            width: 100%;
            padding: 12px;
            border: 3px solid #81c784;
            border-radius: 10px;
            font-size: clamp(13px, 3vw, 16px);
            background: white;
            color: #2e7d32;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:focus {
            outline: none;
            border-color: #4caf50;
            box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.1);
        }

        .range-container {
            background: #fafafa;
            padding: 15px;
            border-radius: 10px;
            border: 3px solid #81c784;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: #a5d6a7;
            border-radius: 5px;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            background: #4caf50;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            background: #45a049;
            transform: scale(1.2);
        }

        input[type="range"]::-moz-range-thumb {
            width: 22px;
            height: 22px;
            background: #4caf50;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .range-value {
            text-align: center;
            color: #2e7d32;
            font-weight: 700;
            font-size: clamp(14px, 3vw, 18px);
            margin-top: 8px;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        @media (min-width: 480px) {
            .button-group {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 768px) {
            .button-group {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .btn {
            padding: clamp(12px, 3vw, 16px);
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: clamp(14px, 3vw, 16px);
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(76, 175, 80, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 50px;
        }

        .btn:hover:not(:disabled) {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(76, 175, 80, 0.4);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn:disabled {
            background: #c8e6c9;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            opacity: 0.6;
        }

        .btn-secondary {
            background: #66bb6a;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #5cb860;
        }

        .btn-danger {
            background: #ef5350;
        }

        .btn-danger:hover:not(:disabled) {
            background: #e53935;
        }

        .btn-download {
            background: #26a69a;
        }

        .btn-download:hover:not(:disabled) {
            background: #00897b;
        }

        .audio-player {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 3px solid #81c784;
            text-align: center;
        }

        audio {
            width: 100%;
            margin-top: 12px;
            outline: none;
            max-width: 100%;
        }

        audio::-webkit-media-controls-panel {
            background: #e8f5e9;
        }

        .status-message {
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
            font-size: clamp(13px, 3vw, 16px);
            display: none;
        }

        .status-success {
            background: #c8e6c9;
            color: #2e7d32;
            border: 2px solid #81c784;
        }

        .status-error {
            background: #ffcdd2;
            color: #c62828;
            border: 2px solid #ef5350;
        }

        .status-info {
            background: #b2dfdb;
            color: #00695c;
            border: 2px solid #4db6ac;
        }

        .features {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 640px) {
            .features {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .features {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .feature-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 3px solid #a5d6a7;
            text-align: center;
            transition: all 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(76, 175, 80, 0.2);
        }

        .feature-icon {
            font-size: clamp(32px, 8vw, 48px);
            margin-bottom: 10px;
        }

        .feature-title {
            color: #2e7d32;
            font-size: clamp(14px, 3vw, 18px);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .feature-desc {
            color: #66bb6a;
            font-size: clamp(12px, 2.5vw, 14px);
            line-height: 1.4;
        }

        .voice-info {
            background: #fafafa;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            border-left: 4px solid #4caf50;
        }

        .voice-info-item {
            display: flex;
            justify-content: space-between;
            margin: 6px 0;
            color: #2e7d32;
            font-size: clamp(12px, 2.5vw, 14px);
        }

        .voice-info-label {
            font-weight: 600;
        }

        .loading-spinner {
            display: none;
            margin: 15px auto;
            width: 40px;
            height: 40px;
            border: 4px solid #c8e6c9;
            border-top: 4px solid #4caf50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #e8f5e9;
        }

        ::-webkit-scrollbar-thumb {
            background: #66bb6a;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4caf50;
        }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            .header {
                padding: 15px 10px;
            }

            .main-content {
                padding: 12px;
                gap: 15px;
            }

            .section {
                padding: 15px;
            }

            textarea {
                padding: 12px;
            }

            .range-container {
                padding: 12px;
            }

            .btn {
                font-size: 14px;
                padding: 12px 8px;
            }
        }

        /* Tablet adjustments */
        @media (min-width: 768px) and (max-width: 1024px) {
            .main-content {
                padding: 25px;
            }
        }

        /* Desktop adjustments */
        @media (min-width: 1025px) {
            .container {
                max-width: 100%;
            }

            .main-content {
                padding: 30px 50px;
            }
        }

        /* Landscape mobile */
        @media (max-height: 500px) and (orientation: landscape) {
            .header h1 {
                font-size: 18px;
                margin-bottom: 4px;
            }

            .header p {
                font-size: 12px;
            }

            .header {
                padding: 12px;
            }

            textarea {
                min-height: 120px;
            }

            .features {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎙️ Professional Text to Speech Converter</h1>
            <p>Convert Text into Natural-Sounding Audio with 50+ Languages & Voices</p>
        </div>

        <div class="main-content">
            <!-- Text Input Section -->
            <div class="section">
                <div class="section-title">
                    📝 Enter Your Text
                </div>
                <div class="input-group">
                    <label class="label">Type or paste your text here:</label>
                    <textarea id="text-input" placeholder="Enter the text you want to convert to speech...&#10;&#10;• Supports multiple languages&#10;• Natural voice synthesis&#10;• Professional quality audio"></textarea>
                    <div class="char-counter">
                        <span id="char-count">0</span> / 5000 characters
                    </div>
                </div>
            </div>

            <!-- Voice Settings Section -->
            <div class="section">
                <div class="section-title">
                    🎵 Voice Settings
                </div>
                
                <div class="controls-grid">
                    <div class="input-group">
                        <label class="label">Select Language & Voice:</label>
                        <select id="voice-select">
                            <option value="">Loading voices...</option>
                        </select>
                        <div class="voice-info" id="voice-info" style="display:none;">
                            <div class="voice-info-item">
                                <span class="voice-info-label">Language:</span>
                                <span id="voice-lang">-</span>
                            </div>
                            <div class="voice-info-item">
                                <span class="voice-info-label">Gender:</span>
                                <span id="voice-gender">-</span>
                            </div>
                        </div>
                    </div>

                    <div class="input-group">
                        <label class="label">Speech Rate:</label>
                        <div class="range-container">
                            <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">
                            <div class="range-value">
                                <span id="rate-value">1.0</span>x
                            </div>
                        </div>
                    </div>

                    <div class="input-group">
                        <label class="label">Pitch:</label>
                        <div class="range-container">
                            <input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1">
                            <div class="range-value">
                                <span id="pitch-value">1.0</span>x
                            </div>
                        </div>
                    </div>
                </div>

                <div class="controls-grid" style="margin-top: 15px;">
                    <div class="input-group">
                        <label class="label">Volume:</label>
                        <div class="range-container">
                            <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
                            <div class="range-value">
                                <span id="volume-value">100</span>%
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Control Buttons -->
            <div class="button-group">
                <button class="btn" id="play-btn" disabled>
                    ▶️ Play
                </button>
                <button class="btn btn-secondary" id="pause-btn" disabled>
                    ⏸️ Pause
                </button>
                <button class="btn btn-danger" id="stop-btn" disabled>
                    ⏹️ Stop
                </button>
                <button class="btn btn-download" id="download-btn" disabled>
                    ⬇️ Download
                </button>
            </div>

            <!-- Loading Spinner -->
            <div class="loading-spinner" id="loading-spinner"></div>

            <!-- Status Messages -->
            <div class="status-message" id="status-message"></div>

            <!-- Audio Player -->
            <div class="audio-player" id="audio-player" style="display:none;">
                <div class="section-title">🔊 Audio Player</div>
                <audio id="audio-element" controls></audio>
            </div>

            <!-- FOOTER -->
<footer class="footer">

</footer>
          

    <script>
        // Initialize variables
        let voices = [];
        let currentUtterance = null;
        let audioChunks = [];
        let mediaRecorder = null;
        let audioBlob = null;
        let isRecording = false;

        // Get DOM elements
        const textInput = document.getElementById('text-input');
        const charCount = document.getElementById('char-count');
        const voiceSelect = document.getElementById('voice-select');
        const rateInput = document.getElementById('rate');
        const pitchInput = document.getElementById('pitch');
        const volumeInput = document.getElementById('volume');
        const rateValue = document.getElementById('rate-value');
        const pitchValue = document.getElementById('pitch-value');
        const volumeValue = document.getElementById('volume-value');
        const playBtn = document.getElementById('play-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const stopBtn = document.getElementById('stop-btn');
        const downloadBtn = document.getElementById('download-btn');
        const statusMessage = document.getElementById('status-message');
        const audioPlayer = document.getElementById('audio-player');
        const audioElement = document.getElementById('audio-element');
        const loadingSpinner = document.getElementById('loading-spinner');
        const voiceInfo = document.getElementById('voice-info');
        const voiceLang = document.getElementById('voice-lang');
        const voiceGender = document.getElementById('voice-gender');

        // Load voices
        function loadVoices() {
            voices = speechSynthesis.getVoices();
            
            if (voices.length === 0) {
                setTimeout(loadVoices, 100);
                return;
            }

            voiceSelect.innerHTML = '';
            
            // Group voices by language
            const voicesByLang = {};
            voices.forEach(voice => {
                const lang = voice.lang.split('-')[0];
                if (!voicesByLang[lang]) {
                    voicesByLang[lang] = [];
                }
                voicesByLang[lang].push(voice);
            });

            // Add voices to select
            Object.keys(voicesByLang).sort().forEach(lang => {
                const optgroup = document.createElement('optgroup');
                optgroup.label = getLanguageName(lang);
                
                voicesByLang[lang].forEach((voice, index) => {
                    const option = document.createElement('option');
                    option.value = voices.indexOf(voice);
                    option.textContent = `${voice.name} (${voice.lang})`;
                    optgroup.appendChild(option);
                });
                
                voiceSelect.appendChild(optgroup);
            });

            // Select first English voice by default
            const defaultVoice = voices.findIndex(v => v.lang.startsWith('en'));
            if (defaultVoice !== -1) {
                voiceSelect.value = defaultVoice;
                updateVoiceInfo();
            }
        }

        // Get language name
        function getLanguageName(code) {
            const languages = {
                'en': '🇺🇸 English',
                'es': '🇪🇸 Spanish',
                'fr': '🇫🇷 French',
                'de': '🇩🇪 German',
                'it': '🇮🇹 Italian',
                'pt': '🇵🇹 Portuguese',
                'ru': '🇷🇺 Russian',
                'ja': '🇯🇵 Japanese',
                'ko': '🇰🇷 Korean',
                'zh': '🇨🇳 Chinese',
                'ar': '🇸🇦 Arabic',
                'hi': '🇮🇳 Hindi',
                'nl': '🇳🇱 Dutch',
                'pl': '🇵🇱 Polish',
                'tr': '🇹🇷 Turkish',
                'sv': '🇸🇪 Swedish',
                'da': '🇩🇰 Danish',
                'fi': '🇫🇮 Finnish',
                'no': '🇳🇴 Norwegian',
                'cs': '🇨🇿 Czech',
                'el': '🇬🇷 Greek',
                'th': '🇹🇭 Thai',
                'id': '🇮🇩 Indonesian',
                'vi': '🇻🇳 Vietnamese'
            };
            return languages[code] || code.toUpperCase();
        }

        // Update voice info
        function updateVoiceInfo() {
            const selectedVoice = voices[voiceSelect.value];
            if (selectedVoice) {
                voiceInfo.style.display = 'block';
                voiceLang.textContent = selectedVoice.lang;
                
                // Determine gender from voice name
                const name = selectedVoice.name.toLowerCase();
                let gender = 'Unknown';
                if (name.includes('female') || name.includes('woman') || name.includes('girl')) {
                    gender = '👩 Female';
                } else if (name.includes('male') || name.includes('man') || name.includes('boy')) {
                    gender = '👨 Male';
                }
                voiceGender.textContent = gender;
            }
        }

        // Update character count
        function updateCharCount() {
            const count = textInput.value.length;
            charCount.textContent = count;
            
            if (count > 5000) {
                textInput.value = textInput.value.substring(0, 5000);
                charCount.textContent = 5000;
            }
            
            playBtn.disabled = count === 0;
        }

        // Update range values
        function updateRangeValues() {
            rateValue.textContent = rateInput.value;
            pitchValue.textContent = pitchInput.value;
            volumeValue.textContent = Math.round(volumeInput.value * 100);
        }

        // Show status message
        function showStatus(message, type = 'info') {
            statusMessage.textContent = message;
            statusMessage.className = `status-message status-${type}`;
            statusMessage.style.display = 'block';
            
            setTimeout(() => {
                statusMessage.style.display = 'none';
            }, 3000);
        }

        // Play speech
        async function playTTS() {
            const text = textInput.value.trim();
            
            if (!text) {
                showStatus('Please enter some text!', 'error');
                return;
            }

            // Stop any ongoing speech
            speechSynthesis.cancel();

            // Create utterance
            currentUtterance = new SpeechSynthesisUtterance(text);
            currentUtterance.voice = voices[voiceSelect.value];
            currentUtterance.rate = parseFloat(rateInput.value);
            currentUtterance.pitch = parseFloat(pitchInput.value);
            currentUtterance.volume = parseFloat(volumeInput.value);

            // Event handlers
            currentUtterance.onstart = () => {
                showStatus('🎙️ Speech started...', 'success');
                playBtn.disabled = true;
                pauseBtn.disabled = false;
                stopBtn.disabled = false;
                loadingSpinner.style.display = 'none';
            };

            currentUtterance.onend = () => {
                showStatus('✅ Speech completed!', 'success');
                playBtn.disabled = false;
                pauseBtn.disabled = true;
                stopBtn.disabled = true;
            };

            currentUtterance.onerror = (event) => {
                showStatus('❌ Error: ' + event.error, 'error');
                playBtn.disabled = false;
                pauseBtn.disabled = true;
                stopBtn.disabled = true;
                loadingSpinner.style.display = 'none';
            };

            loadingSpinner.style.display = 'block';
            speechSynthesis.speak(currentUtterance);

            // Start recording for download
            startRecording();
        }

        // Pause speech
        function pauseTTS() {
            if (speechSynthesis.speaking && !speechSynthesis.paused) {
                speechSynthesis.pause();
                pauseBtn.innerHTML = '▶️ Resume';
                showStatus('⏸️ Speech paused', 'info');
            } else {
                speechSynthesis.resume();
                pauseBtn.innerHTML = '⏸️ Pause';
                showStatus('▶️ Speech resumed', 'info');
            }
        }

        // Stop speech
        function stopTTS() {
            speechSynthesis.cancel();
            playBtn.disabled = false;
            pauseBtn.disabled = true;
            stopBtn.disabled = true;
            pauseBtn.innerHTML = '⏸️ Pause';
            showStatus('⏹️ Speech stopped', 'info');
            stopRecording();
        }

        // Start recording audio for download
        function startRecording() {
            audioChunks = [];
            
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(stream => {
                    mediaRecorder = new MediaRecorder(stream);
                    
                    mediaRecorder.ondataavailable = (event) => {
                        audioChunks.push(event.data);
                    };
                    
                    mediaRecorder.onstop = () => {
                        audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        const audioUrl = URL.createObjectURL(audioBlob);
                        audioElement.src = audioUrl;
                        audioPlayer.style.display = 'block';
                        downloadBtn.disabled = false;
                        stream.getTracks().forEach(track => track.stop());
                    };
                    
                    mediaRecorder.start();
                    isRecording = true;
                })
                .catch(err => {
                    console.log('Recording not available:', err);
                    downloadBtn.disabled = false;
                });
        }

        // Stop recording
        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
            }
        }

        // Download audio
        function downloadAudio() {
            if (audioBlob) {
                const url = URL.createObjectURL(audioBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `speech_${Date.now()}.wav`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showStatus('✅ Audio downloaded successfully!', 'success');
            } else {
                showStatus('💡 Tip: Recording feature requires microphone permission', 'info');
            }
        }
